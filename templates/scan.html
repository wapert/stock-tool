<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>股票掃描 — 動能訊號</title>
  <link rel="manifest" href="/static/manifest.json"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0d1117; --bg2:#161b22; --bg3:#21262d;
      --border:#30363d; --text:#e6edf3; --muted:#8b949e; --dim:#484f58;
      --blue:#58a6ff; --green:#3fb950; --red:#f85149;
      --yellow:#e3b341; --orange:#f0883e; --purple:#d2a8ff;
    }
    body { font-family:"Helvetica Neue",Arial,"PingFang TC",sans-serif;
           background:var(--bg); color:var(--text); min-height:100vh; }

    /* ── topbar ── */
    .topbar { display:flex; align-items:center; gap:.75rem; padding:0 1.25rem;
              height:50px; background:var(--bg2); border-bottom:1px solid var(--border);
              position:sticky; top:0; z-index:10; }
    .topbar h1 { font-size:1rem; font-weight:700; color:var(--blue); white-space:nowrap; }
    .nav-link  { color:var(--muted); font-size:.82rem; text-decoration:none;
                 padding:.3rem .7rem; border:1px solid var(--border); border-radius:6px; }
    .nav-link:hover { color:var(--text); border-color:var(--muted); }

    /* ── toolbar ── */
    .toolbar { display:flex; align-items:center; gap:.6rem; flex-wrap:wrap;
               padding:.65rem 1.25rem; background:var(--bg2);
               border-bottom:1px solid var(--border); }

    /* Market toggle */
    .mkt-toggle { display:flex; border:1px solid var(--border); border-radius:7px; overflow:hidden; }
    .mkt-btn    { padding:.35rem .85rem; background:none; border:none; cursor:pointer;
                  font-size:.85rem; font-weight:600; color:var(--muted); }
    .mkt-btn.active { background:var(--blue); color:#fff; }

    /* Signal filter chips */
    .filter-chips { display:flex; gap:.35rem; flex-wrap:wrap; flex:1; }
    .f-chip { padding:.28rem .7rem; border-radius:20px; border:1px solid var(--border);
              background:none; color:var(--muted); cursor:pointer;
              font-size:.78rem; font-weight:600; white-space:nowrap; }
    .f-chip.active { border-color:var(--blue); color:var(--blue); background:#1f6feb22; }

    /* Scan button */
    .btn-scan { padding:.38rem 1.1rem; border-radius:6px; border:none;
                background:#238636; color:#fff; font-size:.88rem;
                font-weight:700; cursor:pointer; white-space:nowrap; }
    .btn-scan:hover   { background:#2ea043; }
    .btn-scan:disabled{ opacity:.45; cursor:default; }

    .scan-meta { font-size:.72rem; color:var(--dim); margin-left:auto; white-space:nowrap; }

    /* ── results ── */
    .content { padding:1rem 1.25rem 2rem; }
    .empty-msg { text-align:center; color:var(--muted); padding:3rem 1rem; font-size:.9rem; }

    /* result table */
    .scan-table { width:100%; border-collapse:collapse; font-size:.84rem; }
    .scan-table thead th {
      background:var(--bg2); color:var(--muted); font-weight:600;
      padding:.5rem .75rem; text-align:left; white-space:nowrap;
      border-bottom:2px solid var(--border); cursor:pointer;
      user-select:none;
    }
    .scan-table thead th:hover { color:var(--text); }
    .scan-table tbody tr { border-bottom:1px solid var(--bg3); transition:background .1s; }
    .scan-table tbody tr:hover { background:var(--bg2); }
    .scan-table tbody td { padding:.55rem .75rem; vertical-align:middle; white-space:nowrap; }
    .sort-icon { font-size:.7em; color:var(--blue); margin-left:.2em; }

    /* cells */
    .sym-cell .sym  { font-weight:700; color:var(--blue); }
    .sym-cell .co   { font-size:.7rem; color:var(--muted); display:block; }
    .pos { color:var(--green); font-weight:600; }
    .neg { color:var(--red);   font-weight:600; }
    .na  { color:var(--dim); }
    .price-cell { font-weight:600; }

    /* rsi chip */
    .rsi-chip { display:inline-block; padding:.1rem .38rem; border-radius:4px;
                font-size:.78rem; font-weight:700; }
    .rsi-hot  { background:#3d1515; color:var(--red); }
    .rsi-cold { background:#0d2a1a; color:var(--green); }
    .rsi-norm { color:var(--muted); }

    /* signal chips */
    .sig-wrap { display:flex; gap:.25rem; flex-wrap:wrap; }
    .sig-chip { display:inline-block; font-size:.68rem; font-weight:700;
                padding:.1rem .38rem; border-radius:4px; white-space:nowrap; }
    .sig-bull { background:#0d2a1a; color:var(--green); }
    .sig-bear { background:#3d1515; color:var(--red); }
    .sig-warn { background:#2d1f0e; color:var(--yellow); }

    /* ── Score info popup ── */
    .score-info-wrap { position:relative; display:inline-block; }
    .score-info-btn  { background:none; border:none; cursor:pointer;
                       color:var(--dim); font-size:.8rem; padding:0 .2rem;
                       vertical-align:middle; line-height:1; }
    .score-info-btn:hover { color:var(--blue); }
    .score-popup { display:none; position:absolute; top:calc(100% + 6px); left:0;
                   z-index:500; background:var(--bg2); border:1px solid var(--border);
                   border-radius:10px; padding:.75rem 1rem; width:310px;
                   box-shadow:0 8px 24px rgba(0,0,0,.5); font-size:.78rem; line-height:1.6; }
    .score-popup.open { display:block; }
    .score-popup h4 { font-size:.8rem; color:var(--blue); margin-bottom:.5rem; }
    .score-popup table { width:100%; border-collapse:collapse; }
    .score-popup td { padding:.18rem .3rem; }
    .score-popup td:first-child { color:var(--muted); white-space:nowrap; }
    .score-popup td:last-child  { text-align:right; font-weight:700; }
    .score-popup .sep { border-top:1px solid var(--border); margin:.4rem 0; }
    .sp-bull { color:var(--green); }
    .sp-bear { color:var(--red);   }
    .sp-note { font-size:.7rem; color:var(--dim); margin-top:.5rem; }

    /* momentum score badge */
    .score-badge { display:inline-block; min-width:2.4rem; text-align:center;
                   font-size:.82rem; font-weight:800; padding:.15rem .45rem;
                   border-radius:6px; }
    .score-s3  { background:#071a10; color:#3fb950; border:1px solid #238636; }  /* ≥6 */
    .score-s2  { background:#0d2a1a; color:#3fb950; }  /* 3-5 */
    .score-s1  { background:#1a2b1a; color:#7ee787; }  /* 1-2 */
    .score-s0  { background:var(--bg3); color:var(--dim); }  /* 0 */
    .score-sm1 { background:#2d1515; color:#f85149; }  /* -1 to -2 */
    .score-sm2 { background:#3d1515; color:#f85149; }  /* ≤ -3 */

    /* spinner */
    .spinner-wrap { display:flex; justify-content:center; align-items:center;
                    gap:.75rem; padding:3rem; color:var(--muted); font-size:.9rem; }
    .spinner-ring { width:24px; height:24px; border:2px solid var(--border);
                    border-top-color:var(--blue); border-radius:50%;
                    animation:spin .75s linear infinite; flex-shrink:0; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* themes */
    html.theme-white {
      --bg:#ffffff; --bg2:#f6f8fa; --bg3:#eaeef2;
      --border:#d0d7de; --text:#24292f; --muted:#57606a; --dim:#8c959f;
    }
    html.theme-lightblue {
      --bg:#eaf5ff; --bg2:#d7edf9; --bg3:#c2dff0;
      --border:#8abcd8; --text:#0a2742; --muted:#2d6a8a; --dim:#5a90b0;
    }
    html.theme-lightyellow {
      --bg:#fffbe8; --bg2:#fef9df; --bg3:#fdf7d7;
      --border:#f3eac1; --text:#1e1400; --muted:#503800; --dim:#8d7318;
    }

    /* responsive */
    /* ── Mobile card layout ── */
    .m-card-list { display:none; flex-direction:column; gap:.5rem; }
    .m-card { background:var(--bg2); border:1px solid var(--border);
              border-radius:10px; padding:.6rem .75rem; }
    .m-card-top { display:flex; align-items:center; gap:.45rem;
                  margin-bottom:.3rem; flex-wrap:wrap; }
    .m-card-sym  { font-weight:700; color:var(--blue); font-size:.92rem; }
    .m-card-co   { font-size:.72rem; color:var(--muted); flex:1;
                   overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .m-card-mid  { display:flex; align-items:center; gap:.5rem;
                   flex-wrap:wrap; margin-bottom:.3rem; font-size:.78rem; }
    .m-card-sigs { display:flex; flex-wrap:wrap; gap:.25rem; }

    /* ── TW card layout (colored left border) ── */
    .tw-card { background:var(--bg2); border:1px solid var(--border);
               border-radius:10px; overflow:hidden; display:flex; }
    .tw-card-bar { width:5px; flex-shrink:0; }
    .tw-card-bar.bull { background:var(--green); }
    .tw-card-bar.bear { background:var(--red); }
    .tw-card-bar.warn { background:var(--yellow); }
    .tw-card-body { flex:1; padding:.55rem .7rem; min-width:0; }
    .tw-card-top  { display:flex; align-items:center; gap:.4rem; margin-bottom:.25rem; }
    .tw-card-sym  { font-weight:700; color:var(--blue); font-size:.9rem; white-space:nowrap; }
    .tw-card-name { font-size:.72rem; color:var(--muted); flex:1;
                    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tw-card-chg  { font-size:.85rem; font-weight:700; white-space:nowrap; }
    .tw-card-mid  { display:flex; align-items:center; gap:.45rem; flex-wrap:wrap;
                    font-size:.74rem; margin-bottom:.3rem; }
    .tw-card-kd   { color:var(--purple); font-size:.72rem; }
    .tw-card-sigs { display:flex; flex-wrap:wrap; gap:.22rem; }
    /* KD progress bar */
    .kd-bar-wrap  { display:flex; align-items:center; gap:.25rem; font-size:.68rem; color:var(--dim); }
    .kd-bar       { height:4px; border-radius:2px; background:var(--bg3); width:55px; overflow:hidden; }
    .kd-bar-fill  { height:100%; border-radius:2px; }


    /* ── Add to profile popup ── */
    .sap { position:fixed; z-index:1000; background:var(--bg2);
           border:1px solid var(--border); border-radius:10px;
           box-shadow:0 8px 24px rgba(0,0,0,.5);
           min-width:180px; font-size:.82rem; overflow:hidden; }
    .sap-title { padding:.5rem .75rem; font-weight:700; color:var(--blue);
                 border-bottom:1px solid var(--border); font-size:.85rem; }
    .sap-item  { display:flex; align-items:center; justify-content:space-between;
                 padding:.42rem .75rem; cursor:pointer; gap:.75rem; }
    .sap-item:hover { background:var(--bg3); }
    .sap-name  { color:var(--text); font-weight:600; }
    .sap-status { font-size:.72rem; font-weight:700; white-space:nowrap; }
    .sap-in  .sap-status { color:var(--green); }
    .sap-add .sap-status { color:var(--dim); }
    .sap-empty { padding:.5rem .75rem; color:var(--dim); font-size:.78rem; }
    @media (max-width:640px) {
      .topbar { padding:0 .75rem; }
      .toolbar { padding:.5rem .75rem; }
      .content { padding:.6rem .75rem; }
      .scan-table-wrap { display:none !important; }
      .m-card-list { display:flex; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <h1>🔍 動能掃描</h1>
  <a class="nav-link" href="/">🏠 Home</a>
  <a class="nav-link" href="/market">📊 市場</a>
  <a class="nav-link" href="/options">📋 選擇權</a>
</div>

<div class="toolbar">
  <!-- Market toggle -->
  <div class="mkt-toggle">
    <button class="mkt-btn active" id="mktUS" onclick="setMarket('US')">🇺🇸 US</button>
    <button class="mkt-btn"        id="mktTW" onclick="setMarket('TW')">🇹🇼 TW</button>
  </div>

  <!-- US Signal filters -->
  <div class="filter-chips" id="filterChipsUS">
    <button class="f-chip active" data-f="all"        onclick="setFilter('all')">全部</button>
    <button class="f-chip"        data-f="squeeze"    onclick="setFilter('squeeze')">⚡ Squeeze</button>
    <button class="f-chip"        data-f="supertrend" onclick="setFilter('supertrend')">🔼 趨勢翻轉</button>
    <button class="f-chip"        data-f="ma"         onclick="setFilter('ma')">📈 MA突破</button>
    <button class="f-chip"        data-f="52w"        onclick="setFilter('52w')">🏆 52W高</button>
    <button class="f-chip"        data-f="volume"     onclick="setFilter('volume')">💥 爆量</button>
  </div>
  <!-- TW Signal filters -->
  <div class="filter-chips" id="filterChipsTW" style="display:none">
    <button class="f-chip active" data-f="all"        onclick="setFilter('all')">全部</button>
    <button class="f-chip"        data-f="kd_gold"    onclick="setFilter('kd_gold')">📈 KD金叉</button>
    <button class="f-chip"        data-f="kd_dead"    onclick="setFilter('kd_dead')">📉 KD死叉</button>
    <button class="f-chip"        data-f="kd_over"    onclick="setFilter('kd_over')">🔥 KD超賣</button>
    <button class="f-chip"        data-f="bull_align" onclick="setFilter('bull_align')">🐂 多頭排列</button>
    <button class="f-chip"        data-f="bear_align" onclick="setFilter('bear_align')">🐻 空頭排列</button>
    <button class="f-chip"        data-f="ma_break"   onclick="setFilter('ma_break')">突破月線</button>
    <button class="f-chip"        data-f="volume"     onclick="setFilter('volume')">💥 爆量</button>
  </div>

  <button class="btn-scan" id="scanBtn" onclick="runScan()">▶ 開始掃描</button>
  <span class="scan-meta" id="scanMeta"></span>
</div>

<div class="content" id="content">
  <div class="empty-msg">選擇市場與訊號類型，點擊「▶ 開始掃描」</div>
</div>

<script>
(function(){
  const t = localStorage.getItem("theme") || "dark";
  if (t !== "dark") document.documentElement.classList.add("theme-" + t);
})();

let _market = "US", _filter = "all", _results = [], _sortCol = "score", _sortDir = "desc";

function setMarket(m) {
  _market = m;
  document.getElementById("mktUS").classList.toggle("active", m === "US");
  document.getElementById("mktTW").classList.toggle("active", m === "TW");
  document.getElementById("filterChipsUS").style.display = m === "US" ? "" : "none";
  document.getElementById("filterChipsTW").style.display = m === "TW" ? "" : "none";
  _filter = "all";
  document.querySelectorAll(".f-chip").forEach(b =>
    b.classList.toggle("active", b.dataset.f === "all"));
}

function setFilter(f) {
  _filter = f;
  document.querySelectorAll(".f-chip").forEach(b =>
    b.classList.toggle("active", b.dataset.f === f));
  if (_results.length) renderResults(_results);
}

async function runScan() {
  const btn = document.getElementById("scanBtn");
  btn.disabled = true; btn.textContent = "掃描中…";
  document.getElementById("content").innerHTML =
    '<div class="spinner-wrap"><div class="spinner-ring"></div>正在掃描，請稍候（約10-20秒）…</div>';
  document.getElementById("scanMeta").textContent = "";

  try {
    const data = await fetch("/scan/run?market=" + _market).then(r => r.json());
    if (data.locked) {
      document.getElementById("content").innerHTML =
        '<div class="empty-msg" style="color:var(--yellow)">⏳ ' + data.error + '</div>';
      return;
    }
    if (data.error) {
      document.getElementById("content").innerHTML =
        '<div class="empty-msg" style="color:var(--red)">掃描失敗：' + data.error + '</div>';
      return;
    }
    _results = data.results || [];
    const age = data.ts ? Math.round((Date.now()/1000 - data.ts)/60) : 0;
    document.getElementById("scanMeta").textContent =
      "掃描 " + data.total_scanned + " 檔 · 命中 " + data.hits + " 檔"
      + (age > 0 ? " · " + age + " 分鐘前快取" : " · 剛掃描");
    renderResults(_results);
  } catch(e) {
    document.getElementById("content").innerHTML =
      '<div class="empty-msg" style="color:var(--red)">錯誤：' + e.message + '</div>';
  } finally {
    btn.disabled = false; btn.textContent = "▶ 開始掃描";
  }
}

const FILTER_MAP = {
  // US filters
  "squeeze":    ["⚡ Squeeze多","⚡ Squeeze空","⚡ 能量蓄積"],
  "supertrend": ["🔼 趨勢轉多","🔽 趨勢轉空"],
  "ma":         ["突破MA20","突破MA50","跌破MA20"],
  "52w":        ["🏆 破52W高","近52W高"],
  // TW filters
  "kd_gold":    texts => texts.some(t => t.includes("金叉")),
  "kd_dead":    texts => texts.some(t => t.includes("死叉")),
  "kd_over":    texts => texts.some(t => t.includes("超賣")),
  "bull_align": ["多頭排列"],
  "bear_align": ["空頭排列"],
  "ma_break":   ["突破月線","跌破月線"],
  // shared
  "volume":     texts => texts.some(t => t.startsWith("爆量")),
};

function matchesFilter(signals) {
  if (_filter === "all") return true;
  const texts = signals.map(s => s.text);
  const rule = FILTER_MAP[_filter];
  if (typeof rule === "function") return rule(texts);
  return texts.some(t => rule.includes(t));
}

function bullCount(signals) {
  return signals.filter(s => s.type === "bull").length;
}

function renderResults(all) {
  const filtered = all.filter(r => matchesFilter(r.signals));
  if (!filtered.length) {
    document.getElementById("content").innerHTML =
      '<div class="empty-msg">目前條件無符合訊號的股票</div>';
    return;
  }

  // Sort
  const sorted = [...filtered].sort((a, b) => {
    let va, vb;
    if      (_sortCol === "score") { va = a.score||0;       vb = b.score||0; }
    else if (_sortCol === "chg")   { va = a.chg_pct;        vb = b.chg_pct; }
    else if (_sortCol === "rsi")   { va = a.rsi||0;         vb = b.rsi||0; }
    else if (_sortCol === "vol")   { va = a.vol_ratio||0;   vb = b.vol_ratio||0; }
    else if (_sortCol === "sym")   { va = a.symbol; vb = b.symbol;
                                     return _sortDir==="asc"?va.localeCompare(vb):vb.localeCompare(va); }
    else                           { va = a.score||0;       vb = b.score||0; }
    return _sortDir === "desc" ? vb - va : va - vb;
  });

  const isTW = _market === "TW";
  const pFmt = (p, c) => c === "TWD" ? "NT$" + p.toLocaleString() : "$" + p.toFixed(2);

  // mobile cards — TW uses colored-border card, US uses standard card
  const mCards = sorted.map(r => {
    const chgCls = r.chg_pct >= 0 ? "pos" : "neg";
    const rsiCls = (r.rsi||50) >= 70 ? "rsi-hot" : (r.rsi||50) <= 30 ? "rsi-cold" : "rsi-norm";
    const sc = r.score || 0;
    const scCls = sc>=6?"score-s3":sc>=3?"score-s2":sc>=1?"score-s1":sc===0?"score-s0":sc>=-2?"score-sm1":"score-sm2";
    const sigHtml = r.signals.map(s => '<span class="sig-chip sig-'+s.type+'">'+s.text+'</span>').join("");
    const bullSigs = r.signals.filter(s=>s.type==="bull").length;
    const bearSigs = r.signals.filter(s=>s.type==="bear").length;

    if (_market === "TW") {
      // Colored left-border card like the photo
      const barCls = bullSigs > bearSigs ? "bull" : bearSigs > bullSigs ? "bear" : "warn";
      const kdHtml = r.kd_k != null
        ? `<span class="tw-card-kd">K:${r.kd_k} D:${r.kd_d}</span>
           <div class="kd-bar-wrap">
             <div class="kd-bar"><div class="kd-bar-fill" style="width:${Math.min(r.kd_k,100)}%;background:${r.kd_k>r.kd_d?'#3fb950':'#f85149'}"></div></div>
           </div>` : "";
      return `<div class="tw-card">
        <div class="tw-card-bar ${barCls}"></div>
        <div class="tw-card-body">
          <div class="tw-card-top">
            <span class="tw-card-sym" style="cursor:pointer" onclick="clickStock('${r.symbol}',${isTW},event)">${r.symbol}</span>
            <span class="tw-card-name">${r.name}</span>
            <span class="tw-card-chg ${chgCls}">${r.chg_pct>=0?"+":""}${r.chg_pct}%</span>
          </div>
          <div class="tw-card-mid">
            <span class="score-badge ${scCls}">${sc>0?"+":""}${sc}</span>
            ${r.rsi!=null?'<span class="rsi-chip '+rsiCls+'">RSI '+r.rsi+'</span>':''}
            ${kdHtml}
            ${r.vol_ratio!=null?'<span style="color:var(--dim);font-size:.7rem">量比 '+r.vol_ratio+'x</span>':''}
          </div>
          <div class="tw-card-sigs">${sigHtml}</div>
        </div>
      </div>`;
    } else {
      return `<div class="m-card">
        <div class="m-card-top">
          <span class="score-badge ${scCls}">${sc>0?"+":""}${sc}</span>
          <span class="m-card-sym" style="cursor:pointer" onclick="clickStock('${r.symbol}',${isTW},event)">${r.symbol}</span>
          <span class="m-card-co">${r.name}</span>
          <span class="${chgCls}" style="font-weight:600;font-size:.82rem;">${r.chg_pct>=0?"+":""}${r.chg_pct}%</span>
        </div>
        <div class="m-card-mid">
          ${r.rsi!=null?'<span class="rsi-chip '+rsiCls+'">RSI '+r.rsi+'</span>':''}
          ${r.vol_ratio!=null?'<span style="color:var(--dim)">量比 '+r.vol_ratio+'x</span>':''}
        </div>
        <div class="m-card-sigs">${sigHtml}</div>
      </div>`;
    }
  }).join("");

  document.getElementById("content").innerHTML = `
    <p style="font-size:.78rem;color:var(--dim);margin-bottom:.6rem;">
      顯示 ${filtered.length} / ${all.length} 個訊號股票
      <span style="margin-left:1rem;font-size:.72rem;">點擊欄位標題排序</span>
    </p>
    <div class="m-card-list">${mCards}</div>
    <div class="scan-table-wrap" style="overflow-x:auto;">
    <table class="scan-table">
      <thead>
        <tr>
          <th onclick="sortBy('score')">評分${_sortCol==='score'?' <span class="sort-icon">'+(_sortDir==='desc'?'▼':'▲')+'</span>':''} <span class="score-info-wrap"><button class="score-info-btn" onclick="event.stopPropagation();toggleScoreInfo()" title="評分說明">ℹ️</button><div class="score-popup" id="scorePopup"><h4>📊 動能評分說明</h4><table><tr><td>⚡ Squeeze多</td><td class="sp-bull">+3</td></tr><tr><td>🔼 趨勢轉多</td><td class="sp-bull">+3</td></tr><tr><td>🏆 破52W高</td><td class="sp-bull">+3</td></tr><tr><td>RSI脫離超賣</td><td class="sp-bull">+2</td></tr><tr><td>突破 MA50</td><td class="sp-bull">+2</td></tr><tr><td>突破 MA20</td><td class="sp-bull">+1</td></tr><tr><td>近52W高</td><td class="sp-bull">+1</td></tr><tr><td>⚡ 能量蓄積</td><td class="sp-bull">+1</td></tr><tr><td>爆量（多頭時）</td><td class="sp-bull">+1</td></tr></table><div class="sep"></div><table><tr><td>跌破 MA20</td><td class="sp-bear">-2</td></tr><tr><td>RSI脫離超買</td><td class="sp-bear">-2</td></tr><tr><td>⚡ Squeeze空</td><td class="sp-bear">-3</td></tr><tr><td>🔽 趨勢轉空</td><td class="sp-bear">-3</td></tr></table><div class="sep"></div><table><tr><td class="sp-bull">≥ +6</td><td>強力多頭訊號 🔥</td></tr><tr><td class="sp-bull">+3 ~ +5</td><td>多頭動能強</td></tr><tr><td class="sp-bull">+1 ~ +2</td><td>輕微多頭</td></tr><tr><td style="color:var(--dim)">0</td><td>中性</td></tr><tr><td class="sp-bear">-1 ~ -2</td><td>輕微空頭</td></tr><tr><td class="sp-bear">≤ -3</td><td>空頭動能強</td></tr></table><p class="sp-note">分數為各訊號加總，多訊號共鳴時更具參考價值</p></div></span></th>
          <th onclick="sortBy('sym')">股票代碼${_sortCol==='sym'?' <span class="sort-icon">'+(_sortDir==='desc'?'▼':'▲')+'</span>':''}</th>
          <th onclick="sortBy('chg')">漲跌%${_sortCol==='chg'?' <span class="sort-icon">'+(_sortDir==='desc'?'▼':'▲')+'</span>':''}</th>
          <th onclick="sortBy('rsi')">RSI${_sortCol==='rsi'?' <span class="sort-icon">'+(_sortDir==='desc'?'▼':'▲')+'</span>':''}</th>
          ${_market==='TW'?'<th style="color:var(--purple)">KD</th>':''}
          <th onclick="sortBy('vol')">量比${_sortCol==='vol'?' <span class="sort-icon">'+(_sortDir==='desc'?'▼':'▲')+'</span>':''}</th>
          <th>訊號</th>
        </tr>
      </thead>
      <tbody>
        ${sorted.map(r => {
          const chgCls = r.chg_pct >= 0 ? "pos" : "neg";
          const rsiCls = (r.rsi||50) >= 70 ? "rsi-hot" : (r.rsi||50) <= 30 ? "rsi-cold" : "rsi-norm";
          const sigHtml = r.signals.map(s =>
            '<span class="sig-chip sig-' + s.type + '">' + s.text + '</span>'
          ).join("");
          const sc = r.score || 0;
          const scCls = sc >= 6 ? "score-s3" : sc >= 3 ? "score-s2" : sc >= 1 ? "score-s1"
                      : sc === 0 ? "score-s0" : sc >= -2 ? "score-sm1" : "score-sm2";
          const scTxt = (sc > 0 ? "+" : "") + sc;
          return `<tr>
            <td><span class="score-badge ${scCls}">${scTxt}</span></td>
            <td class="sym-cell" style="cursor:pointer" onclick="clickStock('${r.symbol}',${isTW},event)">
              <span class="sym">${r.symbol}</span>
              <span class="co">${r.name}</span>
            </td>
            <td class="${chgCls}">${r.chg_pct >= 0 ? "+" : ""}${r.chg_pct}%</td>
            <td><span class="rsi-chip ${rsiCls}">${r.rsi != null ? r.rsi : "—"}</span></td>
            ${_market==='TW'?`<td style="color:var(--purple);font-size:.78rem;">${r.kd_k!=null?'K:'+r.kd_k+' D:'+r.kd_d:'—'}</td>`:''}
            <td>${r.vol_ratio != null ? r.vol_ratio + "x" : '<span class="na">—</span>'}</td>
            <td><div class="sig-wrap">${sigHtml}</div></td>
          </tr>`;
        }).join("")}
      </tbody>
    </table>
    </div>`; // close scan-table-wrap
}

function toggleScoreInfo() {
  document.getElementById("scorePopup").classList.toggle("open");
}
document.addEventListener("click", function(e) {
  const p = document.getElementById("scorePopup");
  if (p && !p.closest(".score-info-wrap").contains(e.target)) {
    p.classList.remove("open");
  }
});

function sortBy(col) {
  if (_sortCol === col) _sortDir = _sortDir === "desc" ? "asc" : "desc";
  else { _sortCol = col; _sortDir = col === "sym" ? "asc" : "desc"; }
  if (_results.length) renderResults(_results);
}

// ── Add to profile popup ─────────────────────────────────────────────────────
let _sapProfilesCache = null;
async function _sapLoadProfiles() {
  if (_sapProfilesCache) return _sapProfilesCache;
  try { _sapProfilesCache = await fetch("/profiles").then(r=>r.json()); }
  catch(e) { _sapProfilesCache = {}; }
  return _sapProfilesCache;
}
async function clickStock(sym, isTW, event) {
  event.stopPropagation();
  document.querySelectorAll(".sap").forEach(el=>el.remove());
  const profiles = await _sapLoadProfiles();
  const names = Object.keys(profiles);
  const popup = document.createElement("div");
  popup.className = "sap";
  if (!names.length) {
    popup.innerHTML = `<div class="sap-title">${isTW?"🇹🇼":"🇺🇸"} ${sym}</div><div class="sap-empty">尚無投資組合</div>`;
  } else {
    const items = names.map(name => {
      const stocks = (profiles[name].stocks||[]).map(s=>s.toUpperCase());
      const inProf = stocks.includes(sym.toUpperCase());
      return `<div class="sap-item ${inProf?"sap-in":"sap-add"}" data-name="${name}" data-sym="${sym}" data-tw="${isTW}" onclick="sapToggle(this)">
        <span class="sap-name">${name}</span>
        <span class="sap-status">${inProf?"✓ 已在組合":"＋ 加入組合"}</span>
      </div>`;
    }).join("");
    popup.innerHTML = `<div class="sap-title">${isTW?"🇹🇼":"🇺🇸"} ${sym}</div>${items}`;
  }
  const r = event.target.getBoundingClientRect();
  popup.style.top  = Math.min(r.bottom+6, window.innerHeight-200)+"px";
  popup.style.left = Math.min(r.left,     window.innerWidth-200)+"px";
  document.body.appendChild(popup);
  setTimeout(()=>document.addEventListener("click",()=>document.querySelectorAll(".sap").forEach(el=>el.remove()),{once:true}),50);
}
async function sapToggle(el) {
  const name=el.dataset.name, sym=el.dataset.sym, inProf=el.classList.contains("sap-in");
  el.style.opacity=".5";
  try {
    const data = await fetch(`/profiles/${encodeURIComponent(name)}`).then(r=>r.json());
    let stocks = [...(data.stocks||[])];
    const idx = stocks.map(s=>s.toUpperCase()).indexOf(sym.toUpperCase());
    if (inProf && idx>=0) stocks.splice(idx,1);
    else if (!inProf) { stocks.push(sym); localStorage.setItem("profile_needs_sync","1"); }
    await fetch(`/profiles/${encodeURIComponent(name)}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({stocks})});
    const nowIn=!inProf;
    el.className="sap-item "+(nowIn?"sap-in":"sap-add");
    el.querySelector(".sap-status").textContent=nowIn?"✓ 已在組合":"＋ 加入組合";
    _sapProfilesCache=null;
  } catch(e){alert("操作失敗："+e.message);}
  el.style.opacity="1";
}
</script>
