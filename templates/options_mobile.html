<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#161b22"/>
  <link rel="manifest" href="/static/manifest.json"/>
  <title>選擇權</title>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0d1117; --bg2:#161b22; --bg3:#21262d;
      --border:#30363d; --text:#e6edf3; --muted:#8b949e; --dim:#484f58;
      --blue:#58a6ff; --green:#3fb950; --red:#f85149;
      --yellow:#e3b341; --orange:#f0883e; --purple:#d2a8ff;
      --topbar-h:50px; --bottombar-h:50px;
    }
    html,body { height:100%; overflow:hidden; }
    body { font-family:"Helvetica Neue",Arial,"PingFang TC",sans-serif;
           background:var(--bg); color:var(--text);
           display:flex; flex-direction:column;
           -webkit-tap-highlight-color:transparent; touch-action:manipulation; }

    .topbar { height:var(--topbar-h); display:flex; align-items:center; gap:.5rem;
              padding:0 1rem; background:var(--bg2); border-bottom:1px solid var(--border);
              flex-shrink:0; }
    .topbar h1 { font-size:.95rem; font-weight:700; color:var(--blue); flex:1; }
    .back-btn  { color:var(--muted); font-size:.8rem; text-decoration:none;
                 padding:.25rem .6rem; border:1px solid var(--border); border-radius:6px; }

    /* search bar */
    .search-bar { display:flex; gap:.5rem; padding:.6rem .75rem;
                  background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; }
    .search-bar input { flex:1; padding:.45rem .75rem; border-radius:6px;
                        border:1px solid var(--border); background:var(--bg3);
                        color:var(--text); font-size:16px; outline:none; }
    .search-bar input:focus { border-color:var(--blue); }
    .btn { padding:.42rem .85rem; border-radius:6px; border:none; font-size:.82rem;
           font-weight:600; cursor:pointer; white-space:nowrap; }
    .btn-green { background:#238636; color:#fff; }
    .btn-ghost { background:var(--bg3); color:var(--muted); border:1px solid var(--border); }

    /* scroll */
    .main { flex:1; overflow-y:auto; padding:.6rem;
            padding-bottom:calc(var(--bottombar-h)+.6rem);
            -webkit-overflow-scrolling:touch; }

    /* option card */
    .opt-card { background:var(--bg2); border:1px solid var(--border);
                border-radius:10px; margin-bottom:.6rem; overflow:hidden; }
    .card-top { display:flex; align-items:center; gap:.5rem;
                padding:.6rem .75rem; border-bottom:1px solid var(--border); }
    .sym  { font-weight:700; color:var(--blue); font-size:.9rem; }
    .name { font-size:.72rem; color:var(--muted); flex:1;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .price-block { text-align:right; }
    .price-val { font-size:.95rem; font-weight:700; }
    .chg-val   { font-size:.75rem; font-weight:600; }
    .pos { color:var(--green); } .neg { color:var(--red); }

    .card-grid { display:grid; grid-template-columns:repeat(3,1fr);
                 gap:1px; background:var(--border); }
    .cg-item { background:var(--bg2); padding:.4rem .5rem;
               display:flex; flex-direction:column; align-items:center; gap:.1rem; }
    .cg-label { font-size:.62rem; color:var(--dim); text-transform:uppercase;
                letter-spacing:.04em; }
    .cg-val   { font-size:.82rem; font-weight:600; }
    .purple   { color:var(--purple); }
    .orange   { color:var(--orange); }
    .na       { color:var(--dim); }

    /* P/C bar */
    .pc-bar-wrap { padding:.4rem .75rem .5rem; }
    .pc-bar-label{ display:flex; justify-content:space-between;
                   font-size:.72rem; margin-bottom:.25rem; }
    .pc-bar { display:flex; height:6px; border-radius:3px; overflow:hidden; }
    .pc-put  { background:var(--red); }
    .pc-call { background:var(--green); }
    .pc-ratio-row{ display:flex; justify-content:space-between; align-items:center;
                   padding:.35rem .75rem; border-top:1px solid var(--border); }
    .pc-label { font-size:.72rem; color:var(--dim); }
    .pc-val   { font-size:.85rem; font-weight:700; }

    /* ivr chip */
    .ivr-chip { padding:.1rem .4rem; border-radius:4px; font-size:.78rem; font-weight:700; }
    .ivr-hi  { background:#3d1515; color:var(--red); }
    .ivr-mid { background:#2d1f0e; color:var(--orange); }
    .ivr-lo  { background:#0d2a1a; color:var(--green); }

    .error-card { background:var(--bg2); border:1px solid #3d1515;
                  border-radius:10px; padding:.75rem; margin-bottom:.6rem;
                  color:var(--red); font-size:.82rem; }

    /* bottom bar */
    .bottombar { height:var(--bottombar-h); background:var(--bg2);
                 border-top:1px solid var(--border); display:flex;
                 align-items:center; justify-content:center; flex-shrink:0; }
    .note { font-size:.68rem; color:var(--dim); text-align:center; padding:0 .5rem; }

    /* spinner */
    .spinner { text-align:center; color:var(--muted); padding:2rem; font-size:.85rem; }

    /* themes */
    html.theme-white {
      --bg:#ffffff; --bg2:#f6f8fa; --bg3:#eaeef2;
      --border:#d0d7de; --text:#24292f; --muted:#57606a; --dim:#8c959f;
    }
    html.theme-lightblue {
      --bg:#eaf5ff; --bg2:#d7edf9; --bg3:#c2dff0;
      --border:#8abcd8; --text:#0a2742; --muted:#2d6a8a; --dim:#5a90b0;
    }
    html.theme-lightyellow {
      --bg:#fffbe8; --bg2:#fef9df; --bg3:#fdf7d7;
      --border:#f3eac1; --text:#1e1400; --muted:#503800; --dim:#8d7318;
    }
    .spinner { display:flex; justify-content:center; align-items:center; padding:0.5rem 0; }
    .spinner-ring {
      width:22px; height:22px;
      border:2px solid #30363d;
      border-top-color:#58a6ff;
      border-radius:50%;
      animation:spin-ring 0.75s linear infinite;
    }
    @keyframes spin-ring { to { transform:rotate(360deg); } }

    /* OI chart button */
    .oi-btn { width:100%; padding:.4rem; border:none; background:var(--bg3);
              color:var(--blue); font-size:.78rem; font-weight:600; cursor:pointer;
              border-top:1px solid var(--border); border-radius:0 0 10px 10px; }
    .oi-btn:active { opacity:.7; }

    /* OI modal */
    .oi-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:300;
                  display:none; align-items:flex-end; justify-content:center; }
    .oi-overlay.open { display:flex; }
    .oi-modal { background:var(--bg2); border:1px solid var(--border);
                border-radius:14px 14px 0 0; width:100%; max-height:85vh;
                display:flex; flex-direction:column; overflow:hidden; }
    .oi-header { display:flex; align-items:center; gap:.5rem;
                 padding:.7rem 1rem; border-bottom:1px solid var(--border); }
    .oi-header h2 { font-size:.88rem; font-weight:700; color:var(--blue); flex:1; }
    .oi-close { background:none; border:none; color:var(--muted); cursor:pointer;
                font-size:1.1rem; padding:.2rem .5rem; }
    .oi-controls { display:flex; align-items:center; gap:.5rem; flex-wrap:wrap;
                   padding:.5rem .75rem; border-bottom:1px solid var(--border); }
    .oi-expiry { flex:1; padding:.3rem .5rem; border-radius:6px;
                 border:1px solid var(--border); background:var(--bg3);
                 color:var(--text); font-size:.8rem; outline:none; }
    .oi-tabs { display:flex; gap:.3rem; }
    .oi-tab { padding:.25rem .65rem; border-radius:6px; border:1px solid var(--border);
              background:none; color:var(--muted); cursor:pointer;
              font-size:.78rem; font-weight:600; }
    .oi-tab.active { background:var(--blue); color:#fff; border-color:var(--blue); }
    .oi-info { font-size:.7rem; color:var(--dim); width:100%; }
    .oi-body { flex:1; overflow:auto; padding:.75rem; min-height:240px; }
  </style>
</head>
<body>

<div class="topbar">
  <h1>📋 選擇權</h1>
  <a class="back-btn" href="/m">🏠 Home</a>
</div>

<div class="search-bar">
  <input id="symInput" type="text" placeholder="AAPL NVDA TSLA…" autocomplete="off"
         onkeydown="if(event.key==='Enter') loadOptions()"/>
  <button class="btn btn-green" onclick="loadOptions()">查詢</button>
  <button class="btn btn-ghost" onclick="loadDefaults()">預設</button>
  <button class="btn btn-ghost" onclick="toggleGuide()">💡</button>
  <button class="btn btn-ghost" id="optAutoBtn" onclick="toggleOptAutoSync()">⏱ 自動</button>
  <span id="optAutoCountdown" style="font-size:.68rem;color:var(--dim);display:none;"></span>
</div>

<!-- guide card -->
<div id="guideCard" style="display:none; background:var(--bg2); border-bottom:1px solid var(--border); padding:.75rem 1rem; font-size:.78rem; line-height:1.7;">
  <b style="color:var(--blue);">ATM IV</b> — 選擇權隱含波動率，代表市場預期的波動幅度。<br/>
  <b style="color:var(--blue);">IV Rank</b> — <span style="color:var(--green);">&lt;30 偏低→買權</span> ｜ <span style="color:var(--red);">&gt;70 偏高→賣權</span><br/>
  <b style="color:var(--yellow);">預期波動 ±1σ</b> — 到期日前 <b>68% 機率</b> 的股價波動區間。<br/>
  &nbsp;&nbsp;公式：股價 × IV × √(天數/365)<br/>
  <b style="color:var(--blue);">P/C &gt;1.2</b> <span style="color:var(--red);">偏空</span> ｜ <b>P/C &lt;0.8</b> <span style="color:var(--green);">偏多</span>
</div>

<div class="main" id="main">
  <div class="spinner"><div class="spinner-ring"></div></div>
</div>

<div class="bottombar">
  <span class="note">IV Rank / Pctl 以HV近似</span>
  <span id="mOptSrc" style="display:none;font-size:.68rem;font-weight:600;padding:.1rem .4rem;border-radius:4px;"></span>
</div>

<script>
(function(){
  const t = localStorage.getItem("theme") || "dark";
  if (t !== "dark") document.documentElement.classList.add("theme-"+t);
})();

function ivrClass(v) {
  if (v == null) return "na";
  if (v > 70) return "ivr-chip ivr-hi";
  if (v > 40) return "ivr-chip ivr-mid";
  return "ivr-chip ivr-lo";
}
function pcClass(v) {
  if (v == null) return "na";
  return v > 1.2 ? "neg" : v < 0.8 ? "pos" : "na";
}
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function renderCard(r) {
  if (r.error) return `<div class="error-card"><b>${esc(r.symbol)}</b>：${esc(r.error)}</div>`;

  const chgCls = r.change  >= 0 ? "pos" : "neg";
  const pctCls = r.chg_pct >= 0 ? "pos" : "neg";
  const putW   = r.put_pct  || 0;
  const callW  = r.call_pct || 0;

  return `<div class="opt-card">
    <div class="card-top">
      <span class="sym">${esc(r.symbol)}</span>
      <span class="name">${esc(r.name)}</span>
      <div class="price-block">
        <div class="price-val">${r.price_fmt}</div>
        <div class="chg-val ${chgCls}">${r.change_fmt} (${r.chg_pct >= 0 ? "+" : ""}${r.chg_pct}%)</div>
      </div>
    </div>
    <div class="card-grid">
      <div class="cg-item">
        <span class="cg-label">ATM IV</span>
        <span class="cg-val purple">${r.atm_iv_fmt}</span>
      </div>
      <div class="cg-item">
        <span class="cg-label">IV Rank</span>
        <span class="cg-val">
          ${r.iv_rank != null ? `<span class="${ivrClass(r.iv_rank)}">${r.iv_rank_fmt}</span>` : `<span class="na">N/A</span>`}
        </span>
      </div>
      <div class="cg-item">
        <span class="cg-label">IV Pctl</span>
        <span class="cg-val">${r.iv_pctl_fmt !== "N/A" ? r.iv_pctl_fmt : `<span class="na">N/A</span>`}</span>
      </div>
      <div class="cg-item">
        <span class="cg-label">Opt Vol</span>
        <span class="cg-val">${r.options_vol_fmt}</span>
      </div>
      <div class="cg-item">
        <span class="cg-label">% Put</span>
        <span class="cg-val neg">${r.put_pct != null ? r.put_pct+"%" : "—"}</span>
      </div>
      <div class="cg-item">
        <span class="cg-label">% Call</span>
        <span class="cg-val pos">${r.call_pct != null ? r.call_pct+"%" : "—"}</span>
      </div>
    </div>
    <div class="pc-bar-wrap">
      <div class="pc-bar-label">
        <span class="neg">Put ${r.put_pct || 0}%</span>
        <span class="pos">Call ${r.call_pct || 0}%</span>
      </div>
      <div class="pc-bar">
        <div class="pc-put"  style="width:${putW}%"></div>
        <div class="pc-call" style="width:${callW}%"></div>
      </div>
    </div>
    <div class="pc-ratio-row">
      <span class="pc-label">P/C Vol Ratio</span>
      <span class="pc-val ${pcClass(r.pc_ratio)}">${r.pc_ratio_fmt}</span>
      <span style="font-size:.7rem;color:var(--dim)">${r.fetched_at || ""}</span>
    </div>
    <div style="padding:.4rem .75rem .55rem; border-top:1px solid var(--border); display:flex; align-items:baseline; gap:.5rem; flex-wrap:wrap;">
      <span style="font-size:.72rem;color:var(--dim);">預期波動 ±1σ</span>
      <span style="font-weight:700;color:var(--yellow);">${r.exp_to_exp_fmt || "N/A"}</span>
      <span style="font-size:.7rem;color:var(--dim);">至 ${(r.nearest_exp||"").slice(5)} (${r.days_to_exp||"?"}d) | 每日 ${r.exp_daily_fmt||"N/A"}</span>
    </div>
    <button class="oi-btn" onclick="openOIChart('${esc(r.symbol)}')">📊 OI 分佈圖</button>
  </div>`;
}

async function fetchAndRender(url) {
  document.getElementById("main").innerHTML = `<div class="spinner"><div class="spinner-ring"></div></div>`;
  try {
    const res  = await fetch(url);
    const data = await res.json();
    const rows = data.results || [data];
    document.getElementById("main").innerHTML = rows.map(renderCard).join("");
    updateOptSrc(rows);
  } catch(e) {
    document.getElementById("main").innerHTML =
      `<div class="error-card">載入失敗：${e.message}</div>`;
  }
}

function updateOptSrc(rows) {
  const el = document.getElementById("mOptSrc");
  if (!el || !rows) return;
  const valid = rows.filter(r => !r.error);
  const hasAlpaca = valid.some(r => r.price_source === "Alpaca");
  const hasYahoo  = valid.some(r => r.price_source !== "Alpaca");
  let label, bg, color;
  if (hasAlpaca) { label="💹 價格 Alpaca IEX"; bg="#0d2a1a"; color="#3fb950"; }
  else           { label="💹 Yahoo Finance (15分鐘延遲)"; bg="#1c2128"; color="#e3b341"; }
  el.textContent = label;
  el.style.cssText = `display:inline;background:${bg};color:${color};padding:.1rem .4rem;border-radius:4px;font-size:.68rem;font-weight:600;`;
}

/* ── auto-sync 60s ── */
let _optAutoTick=null,_optAutoSecs=60,_optAutoOn=false;
const OPT_INTERVAL=60;
function toggleOptAutoSync(){ _optAutoOn?_stopOptAuto():_startOptAuto(); }
function _startOptAuto(){
  _optAutoOn=true; _optAutoSecs=OPT_INTERVAL; _setOptAutoBtn(true);
  _optAutoTick=setInterval(()=>{
    _optAutoSecs--;
    const cd=document.getElementById("optAutoCountdown");
    if(cd){cd.style.display="inline";cd.textContent=`${_optAutoSecs}s`;}
    if(_optAutoSecs<=0){
      _optAutoSecs=OPT_INTERVAL;
      const raw=document.getElementById("symInput").value.trim();
      raw?fetchAndRender(`/options/data?symbols=${encodeURIComponent(raw)}`):fetchAndRender("/options/data");
    }
  },1000);
}
function _stopOptAuto(){
  if(_optAutoTick){clearInterval(_optAutoTick);_optAutoTick=null;}
  _optAutoOn=false; _setOptAutoBtn(false);
  const cd=document.getElementById("optAutoCountdown");
  if(cd)cd.style.display="none";
}
function _setOptAutoBtn(on){
  const btn=document.getElementById("optAutoBtn");
  if(!btn)return;
  btn.textContent=on?"⏱ ON":"⏱ 自動";
  btn.style.cssText=on?"background:#0d2a1a;color:#3fb950;border:1px solid #238636;":"";
}

function loadOptions() {
  const raw = document.getElementById("symInput").value.trim();
  if (!raw) { loadDefaults(); return; }
  fetchAndRender(`/options/data?symbols=${encodeURIComponent(raw)}`);
}
function loadDefaults() {
  document.getElementById("symInput").value = "";
  fetchAndRender("/options/data");
}
function toggleGuide() {
  const g = document.getElementById("guideCard");
  g.style.display = g.style.display === "none" ? "block" : "none";
}

/* ── OI Chart ── */
let _oiSym="", _oiTab="oi", _oiData=null, _oiChart=null;

function openOIChart(sym) {
  _oiSym=sym; _oiTab="oi";
  document.getElementById("tabOI").classList.add("active");
  document.getElementById("tabVol").classList.remove("active");
  document.getElementById("oiOverlay").classList.add("open");
  document.getElementById("oiTitle").textContent=sym+" OI 分佈";
  loadOIChart(sym,"");
}
function closeOIChart() {
  document.getElementById("oiOverlay").classList.remove("open");
  if(_oiChart){_oiChart.destroy();_oiChart=null;}
}
function switchOITab(tab) {
  _oiTab=tab;
  document.getElementById("tabOI").classList.toggle("active",tab==="oi");
  document.getElementById("tabVol").classList.toggle("active",tab==="vol");
  if(_oiData) renderOIChart(_oiData);
}
async function loadOIChart(sym,expiry) {
  document.getElementById("oiInfo").textContent="載入中…";
  if(_oiChart){_oiChart.destroy();_oiChart=null;}
  try {
    const url=`/options/oi?symbol=${sym}${expiry?"&expiry="+expiry:""}`;
    const data=await fetch(url).then(r=>r.json());
    if(data.error){document.getElementById("oiInfo").textContent=data.error;return;}
    _oiData=data;
    const sel=document.getElementById("oiExpiry");
    sel.innerHTML=data.expirations.map(e=>`<option value="${e}" ${e===data.expiry?"selected":""}>${e}</option>`).join("");
    renderOIChart(data);
  } catch(e){document.getElementById("oiInfo").textContent="錯誤: "+e.message;}
}
function renderOIChart(data) {
  if(typeof Chart==="undefined"){document.getElementById("oiInfo").textContent="Chart.js 尚未載入";return;}
  if(_oiChart){_oiChart.destroy();_oiChart=null;}
  const isOI=_oiTab==="oi";
  const callY=isOI?data.call_oi:data.call_vol;
  const putY =isOI?data.put_oi:data.put_vol;
  let info=`現價: $${data.price!=null?data.price.toFixed(2):"—"}`;
  if(data.max_pain) info+=` | Max Pain: $${data.max_pain.toFixed(2)}`;
  document.getElementById("oiInfo").textContent=info;
  const ctx=document.getElementById("oiCanvas").getContext("2d");
  _oiChart=new Chart(ctx,{
    type:"bar",
    data:{
      labels:data.strikes.map(s=>"$"+s.toFixed(0)),
      datasets:[
        {label:"Call "+(isOI?"OI":"Vol"),data:callY,backgroundColor:"rgba(63,185,80,.75)",borderColor:"#3fb950",borderWidth:1},
        {label:"Put " +(isOI?"OI":"Vol"),data:putY, backgroundColor:"rgba(248,81,73,.65)",borderColor:"#f85149",borderWidth:1}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:"#8b949e",boxWidth:12}},
        tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y.toLocaleString()}`}}
      },
      scales:{
        x:{ticks:{color:"#8b949e",maxRotation:45,font:{size:9}},grid:{color:"rgba(255,255,255,.06)"}},
        y:{ticks:{color:"#8b949e",font:{size:9},callback:v=>v>=1e6?v/1e6+"M":v>=1e3?v/1e3+"K":v},grid:{color:"rgba(255,255,255,.06)"}}
      }
    }
  });
}

loadDefaults();
</script>

<!-- OI Modal -->
<div class="oi-overlay" id="oiOverlay" onclick="if(event.target===this)closeOIChart()">
  <div class="oi-modal">
    <div class="oi-header">
      <h2 id="oiTitle">OI 分佈</h2>
      <button class="oi-close" onclick="closeOIChart()">✕</button>
    </div>
    <div class="oi-controls">
      <select class="oi-expiry" id="oiExpiry" onchange="loadOIChart(_oiSym,this.value)"></select>
      <div class="oi-tabs">
        <button class="oi-tab active" id="tabOI"  onclick="switchOITab('oi')">OI</button>
        <button class="oi-tab"        id="tabVol" onclick="switchOITab('vol')">Vol</button>
      </div>
      <span class="oi-info" id="oiInfo"></span>
    </div>
    <div class="oi-body"><canvas id="oiCanvas"></canvas></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</body>
</html>
