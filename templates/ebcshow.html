<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>理財達人秀摘要</title>
  <link rel="manifest" href="/static/manifest.json"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#0d1117; --bg2:#161b22; --bg3:#21262d;
      --border:#30363d; --text:#e6edf3; --muted:#8b949e; --dim:#484f58;
      --blue:#58a6ff; --green:#3fb950; --red:#f85149;
      --yellow:#e3b341; --orange:#f0883e; --purple:#d2a8ff;
    }
    body { font-family:"Helvetica Neue",Arial,"PingFang TC",sans-serif;
           background:var(--bg); color:var(--text); min-height:100vh; }

    .topbar { display:flex; align-items:center; gap:.75rem; padding:0 1.25rem;
              height:50px; background:var(--bg2); border-bottom:1px solid var(--border);
              position:sticky; top:0; z-index:10; }
    .topbar h1 { font-size:1rem; font-weight:700; color:var(--red); white-space:nowrap; }
    .nav-link  { color:var(--muted); font-size:.82rem; text-decoration:none;
                 padding:.3rem .7rem; border:1px solid var(--border); border-radius:6px; }
    .nav-link:hover { color:var(--text); border-color:var(--muted); }

    .toolbar { display:flex; align-items:center; gap:.6rem; flex-wrap:wrap;
               padding:.6rem 1.25rem; background:var(--bg2);
               border-bottom:1px solid var(--border); }
    .btn-refresh { padding:.36rem .9rem; border-radius:6px; border:none;
                   background:#238636; color:#fff; font-size:.85rem;
                   font-weight:600; cursor:pointer; }
    .btn-refresh:disabled { opacity:.45; cursor:default; }
    .meta { font-size:.72rem; color:var(--dim); }

    /* Card grid */
    .content { padding:1rem 1.25rem 3rem; }
    .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
                 gap:1rem; }

    /* Video card */
    .vid-card { background:var(--bg2); border:1px solid var(--border);
                border-radius:12px; overflow:hidden;
                transition:border-color .15s; display:flex; flex-direction:column; }
    .vid-card:hover { border-color:var(--muted); }

    /* Thumbnail */
    .thumb-wrap { position:relative; width:100%; aspect-ratio:16/9;
                  background:var(--bg3); overflow:hidden; }
    .thumb-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
    .thumb-dur { position:absolute; bottom:.35rem; right:.35rem;
                 background:rgba(0,0,0,.8); color:#fff; font-size:.68rem;
                 font-weight:700; padding:.1rem .35rem; border-radius:3px; }
    .thumb-date { position:absolute; top:.35rem; left:.35rem;
                  background:rgba(13,17,23,.85); color:var(--muted);
                  font-size:.68rem; padding:.1rem .35rem; border-radius:3px; }

    /* Card body */
    .card-body { padding:.75rem .85rem; flex:1; display:flex; flex-direction:column; gap:.5rem; }

    .vid-title { font-size:.88rem; font-weight:700; line-height:1.4;
                 display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
                 overflow:hidden; }
    .vid-title a { color:var(--text); text-decoration:none; }
    .vid-title a:hover { color:var(--blue); }

    /* Chapters */
    .chapters { display:flex; flex-direction:column; gap:.2rem; }
    .chap-title { font-size:.65rem; font-weight:700; color:var(--dim);
                  text-transform:uppercase; letter-spacing:.05em; margin-bottom:.15rem; }
    .chap-item { display:flex; align-items:baseline; gap:.35rem; font-size:.76rem; }
    .chap-time { color:var(--blue); font-size:.68rem; font-family:monospace;
                 flex-shrink:0; min-width:2.8rem; }
    .chap-text { color:var(--muted); line-height:1.3; }

    /* Topics / hashtags */
    .tags { display:flex; flex-wrap:wrap; gap:.3rem; }
    .tag { font-size:.68rem; font-weight:600; padding:.1rem .38rem;
           border-radius:4px; background:var(--bg3); color:var(--dim);
           border:1px solid var(--border); }

    /* Stock chips */
    .stocks { display:flex; flex-wrap:wrap; gap:.3rem; margin-top:auto; }
    .stock-chip { font-size:.72rem; font-weight:700; padding:.1rem .4rem;
                  border-radius:4px; cursor:pointer; }
    .stock-tw { background:#1f3a5f; color:var(--blue); }
    .stock-us { background:#0d2a1a; color:var(--green); }

    /* ── Processing overlay ── */
    .processing-overlay {
      position:absolute; inset:0; border-radius:12px;
      background:rgba(13,17,23,.75);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:20; gap:.6rem;
    }
    .hg-icon { font-size:2.8rem; animation:hg-flip 1.2s steps(1) infinite; }
    @keyframes hg-flip {
      0%,49% { content:'⏳'; transform:rotate(0deg); }
      50%,100%{ content:'⌛'; transform:rotate(180deg); }
    }
    .hg-icon::before { content:'⏳'; }
    @keyframes hg-spin {
      0%   { transform:rotate(0deg) scale(1); }
      25%  { transform:rotate(0deg) scale(1.1); }
      50%  { transform:rotate(180deg) scale(1); }
      75%  { transform:rotate(180deg) scale(1.1); }
      100% { transform:rotate(360deg) scale(1); }
    }
    .hg-icon { animation:hg-spin 2s ease-in-out infinite; display:inline-block; }
    .hg-text { color:#fff; font-size:.82rem; font-weight:700; }
    .hg-secs { color:var(--dim); font-size:.72rem; }

    /* AI summary section */
    .ai-section { background:var(--bg3); border-radius:8px; padding:.6rem .75rem;
                  border-left:3px solid var(--purple); margin-top:.1rem; }
    .ai-label   { font-size:.65rem; font-weight:700; color:var(--purple);
                  text-transform:uppercase; letter-spacing:.06em; margin-bottom:.4rem; }
    .ai-stocks  { display:flex; flex-wrap:wrap; gap:.3rem; margin-bottom:.5rem; }
    .ai-stock-card { background:var(--bg2); border:1px solid var(--border);
                     border-radius:6px; padding:.3rem .5rem; font-size:.75rem; }
    .ai-stock-code { font-weight:700; color:var(--blue); }
    .ai-stock-name { color:var(--muted); font-size:.7rem; }
    .ai-stock-view { font-size:.68rem; font-weight:700; padding:.05rem .3rem;
                     border-radius:3px; margin-left:.25rem; }
    .view-bull { background:#0d2a1a; color:var(--green); }
    .view-bear { background:#3d1515; color:var(--red); }
    .view-neut { background:var(--bg3); color:var(--dim); }
    .ai-points  { list-style:none; display:flex; flex-direction:column; gap:.25rem; }
    .ai-points li { font-size:.76rem; color:var(--muted); line-height:1.4;
                    padding-left:.75rem; position:relative; }
    .ai-points li::before { content:"▸"; position:absolute; left:0;
                             color:var(--purple); font-size:.7rem; }
    .ai-market  { display:flex; flex-direction:column; gap:.2rem; margin-top:.35rem; }
    .ai-market-item { font-size:.74rem; color:var(--muted); padding-left:.75rem;
                      position:relative; }
    .ai-market-item::before { content:"📊"; position:absolute; left:0; font-size:.65rem; }
    .ai-sentiment { display:inline-block; font-size:.7rem; font-weight:700;
                    padding:.1rem .4rem; border-radius:4px; margin-top:.3rem; }
    .sent-opt  { background:#0d2a1a; color:var(--green); }
    .sent-caut { background:#2d1f0e; color:var(--yellow); }
    .sent-neut { background:var(--bg3); color:var(--dim); }
    .ai-pending { font-size:.74rem; color:var(--dim); font-style:italic;
                  padding:.4rem 0; }

    /* Watch button */
    .watch-btn { display:block; text-align:center; padding:.38rem;
                 border-radius:6px; background:#3d1515; color:var(--red);
                 text-decoration:none; font-size:.78rem; font-weight:700;
                 border:1px solid #8b1e1e; transition:background .12s; }
    .watch-btn:hover { background:#5a1e1e; }

    /* Spinner */
    .spinner-wrap { display:flex; justify-content:center; align-items:center;
                    gap:.75rem; padding:4rem; color:var(--muted); }
    .spinner-ring { width:24px; height:24px; border:2px solid var(--border);
                    border-top-color:var(--red); border-radius:50%;
                    animation:spin .75s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* themes */
    html.theme-white { --bg:#fff; --bg2:#f6f8fa; --bg3:#eaeef2;
      --border:#d0d7de; --text:#24292f; --muted:#57606a; --dim:#8c959f; }
    html.theme-lightblue { --bg:#eaf5ff; --bg2:#d7edf9; --bg3:#c2dff0;
      --border:#8abcd8; --text:#0a2742; --muted:#2d6a8a; --dim:#5a90b0; }
    html.theme-lightyellow { --bg:#fffbe8; --bg2:#fef9df; --bg3:#fdf7d7;
      --border:#f3eac1; --text:#1e1400; --muted:#503800; --dim:#8d7318; }

    @media (max-width:640px) {
      .card-grid { grid-template-columns:1fr; }
      .content   { padding:.6rem .75rem 2rem; }
    }
    /* ── Stock action popup ── */
    .sap { position:fixed; z-index:1000; background:var(--bg2);
           border:1px solid var(--border); border-radius:10px;
           box-shadow:0 8px 24px rgba(0,0,0,.5);
           min-width:180px; font-size:.82rem; overflow:hidden; }
    .sap-title { padding:.5rem .75rem; font-weight:700; color:var(--blue);
                 border-bottom:1px solid var(--border); font-size:.85rem; }
    .sap-item  { display:flex; align-items:center; justify-content:space-between;
                 padding:.42rem .75rem; cursor:pointer; gap:.75rem; }
    .sap-item:hover { background:var(--bg3); }
    .sap-name  { color:var(--text); font-weight:600; }
    .sap-status { font-size:.72rem; font-weight:700; white-space:nowrap; }
    .sap-in  .sap-status { color:var(--green); }
    .sap-add .sap-status { color:var(--dim); }
    .sap-empty { padding:.5rem .75rem; color:var(--dim); font-size:.78rem; }
    /* clickable chips */
    .stock-chip { cursor:pointer; transition:opacity .12s; }
    .stock-chip:hover { opacity:.75; }
    .ai-stock-card { cursor:pointer; }
    .ai-stock-card:hover { border-color:var(--blue); }
  </style>
</head>
<body>

<div class="topbar">
  <h1>📺 理財達人秀摘要</h1>
  <a class="nav-link" href="/">🏠 Home</a>
  <a class="nav-link" href="/market">📊 市場</a>
</div>

<div class="toolbar">
  <button class="btn-refresh" id="refreshBtn" onclick="refresh()">🔄 立即更新</button>
  <span class="meta" id="metaText">自動每日早上 7:00 更新</span>
</div>

<div class="content" id="content">
  <div class="spinner-wrap"><div class="spinner-ring"></div>載入中…</div>
</div>

<script>
(function(){
  const t = localStorage.getItem("theme")||"dark";
  if(t!=="dark") document.documentElement.classList.add("theme-"+t);
})();

function fmtTime(secs) {
  const m = Math.floor(secs/60), s = secs%60;
  return `${m}:${String(s).padStart(2,"0")}`;
}

function renderCard(v) {
  const chapters = (v.chapters||[]).slice(0,5).map(c =>
    `<div class="chap-item">
       <span class="chap-time">${fmtTime(c.time)}</span>
       <span class="chap-text">${c.title}</span>
     </div>`
  ).join("");

  const tags = (v.hashtags||[]).map(h =>
    `<span class="tag">#${h}</span>`
  ).join("");

  const twChips = (v.tw_stocks||[]).map(s =>
    `<span class="stock-chip stock-tw" onclick="clickStock('${s}',true,event)">${s}</span>`
  ).join("");
  const usChips = (v.us_stocks||[]).map(s =>
    `<span class="stock-chip stock-us" onclick="clickStock('${s}',false,event)">$${s}</span>`
  ).join("");

  // Gemini AI summary section
  let geminiHtml = "";
  const g = v.gemini;
  if (g) {
    const sentCls = g.sentiment==="樂觀"?"sent-opt":g.sentiment==="謹慎"?"sent-caut":"sent-neut";
    const stockCards = (g.stocks||[]).map(s => {
      const viewCls = s.view&&s.view.includes("多")?"view-bull":s.view&&s.view.includes("空")?"view-bear":"view-neut";
      const isTW = /^\d{4,5}$/.test(s.code||"");
      return `<div class="ai-stock-card" onclick="clickStock('${s.code}',${isTW},event)">
        <span class="ai-stock-code">${s.code}</span>
        <span class="ai-stock-name">${s.name||""}</span>
        <span class="ai-stock-view ${viewCls}">${s.view||""}</span>
        ${s.target?`<span style="font-size:.68rem;color:var(--yellow);margin-left:.2rem">目標:${s.target}</span>`:""}
      </div>`;
    }).join("");
    const keyPts = (g.key_points||[]).map(p=>`<li>${p}</li>`).join("");
    const mktPts = (g.market||[]).map(p=>`<div class="ai-market-item">${p}</div>`).join("");
    geminiHtml = `
    <div class="ai-section">
      <div class="ai-label">🤖 Gemini AI 節目分析
        ${g.sentiment?`<span class="ai-sentiment ${sentCls}">${g.sentiment}</span>`:""}
      </div>
      ${stockCards?`<div class="ai-stocks">${stockCards}</div>`:""}
      ${mktPts?`<div class="ai-market">${mktPts}</div>`:""}
      ${keyPts?`<ul class="ai-points">${keyPts}</ul>`:""}
    </div>`;
  } else {
    geminiHtml = `<div class="ai-section"><div class="ai-pending">🤖 AI 摘要待生成
      <button data-vid="${v.id}" onclick="runGemini('${v.id}',this)" style="margin-left:.5rem;font-size:.72rem;padding:.1rem .5rem;background:#1e1040;color:#c084fc;border:1px solid #7c3aed55;border-radius:4px;cursor:pointer;">▶ 立即分析</button>
    </div></div>`;
  }

  const descHtml = (v.desc_lines||[]).map(l =>
    `<div style="font-size:.76rem;color:var(--muted);line-height:1.4">${l}</div>`
  ).join("");

  return `
  <div class="vid-card">
    <div class="thumb-wrap">
      <a href="${v.url}" target="_blank" rel="noopener">
        <img src="${v.thumbnail}" alt="${v.title}" loading="lazy"
             onerror="this.src='https://img.youtube.com/vi/${v.id}/0.jpg'"/>
      </a>
      ${v.pub_tw ? `<span class="thumb-date">${v.pub_tw} 🇹🇼</span>` : v.date ? `<span class="thumb-date">${v.date}</span>` : ""}
      ${v.duration ? `<span class="thumb-dur">${v.duration}</span>` : ""}
    </div>
    <div class="card-body">
      <div class="vid-title">
        <a href="${v.url}" target="_blank" rel="noopener">${v.title}</a>
      </div>
      ${descHtml}
      ${chapters ? `<div class="chapters"><div class="chap-title">📋 討論主題</div>${chapters}</div>` : ""}
      ${tags ? `<div class="tags">${tags}</div>` : ""}
      ${(twChips||usChips) ? `<div class="stocks">${twChips}${usChips}</div>` : ""}
      ${geminiHtml}
      <a class="watch-btn" href="${v.url}" target="_blank" rel="noopener">▶ 觀看影片</a>
    </div>
  </div>`;
}

async function loadData() {
  try {
    const data = await fetch("/ebcshow/data").then(r=>r.json());
    if (data.error && !data.videos?.length) {
      document.getElementById("content").innerHTML =
        `<div style="text-align:center;color:var(--red);padding:3rem">${data.error}</div>`;
      return;
    }
    const videos = data.videos || [];
    document.getElementById("metaText").textContent =
      `共 ${videos.length} 支影片 · 更新時間：${data.updated||"—"}`;
    if (!videos.length) {
      document.getElementById("content").innerHTML =
        '<div style="text-align:center;color:var(--muted);padding:3rem">尚無資料，請點擊「立即更新」</div>';
      return;
    }
    document.getElementById("content").innerHTML =
      `<div class="card-grid">${videos.map(renderCard).join("")}</div>`;
  } catch(e) {
    document.getElementById("content").innerHTML =
      `<div style="text-align:center;color:var(--red);padding:3rem">載入失敗：${e.message}</div>`;
  }
}

async function refresh() {
  const btn = document.getElementById("refreshBtn");
  btn.disabled = true; btn.textContent = "更新中…";
  document.getElementById("content").innerHTML =
    '<div class="spinner-wrap"><div class="spinner-ring"></div>正在抓取最新影片，約需 20 秒…</div>';
  try {
    await fetch("/ebcshow/refresh", {method:"POST"});
    await loadData();
  } catch(e) {
    alert("更新失敗：" + e.message);
  } finally {
    btn.disabled = false; btn.textContent = "🔄 立即更新";
  }
}

let _geminiRunning = false;

async function runGemini(vidId, btn) {
  if (_geminiRunning) {
    alert("⚠️ Only one video for Gemini at a time.\n請等待目前影片分析完成後再試。");
    return;
  }
  // Check server-side global lock (other pages / other clients)
  try {
    const gs = await fetch("/gemini/status").then(r=>r.json());
    if (gs.running) {
      const names = {"ebcshow":"達人秀","ustv":"錢線百分百","ibd":"IBD","bloomberg":"Bloomberg市場分析"};
      const where = names[gs.page] || gs.page;
      alert(`⚠️ Only one video for Gemini at a time.\n目前「${where}」頁面有影片正在分析，請稍後再試。`);
      return;
    }
  } catch(e) {}
  _geminiRunning = true;
  btn.disabled = true; btn.textContent = "啟動中…";

  // Set button to processing state and persist in localStorage
  btn.disabled = true;
  btn.textContent = "AI 分析中 請稍後";
  btn.style.cssText = "background:#1e1040;color:#c084fc;border:1px solid #7c3aed55;";
  _setPending(vidId, true);

  const _finish = (success) => {
    _geminiRunning = false;
    _setPending(vidId, false);
    if (success) {
      btn.textContent = "✓ 完成";
      btn.style.cssText = "background:#0d2a1a;color:#3fb950;border:1px solid #23863655;";
    } else {
      btn.disabled = false;
      btn.textContent = "▶ 立即分析";
      btn.style.cssText = "";
    }
  };

  try {
    const res  = await fetch("/ebcshow/summarize", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({id: vidId})
    });
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); }
    catch(e) {
      _finish(false);
      alert("伺服器錯誤，請稍後再試\n" + text.slice(0,200));
      return;
    }
    if (data.status === "locked") {
      _finish(false);
      alert("⚠️ Only one video for Gemini at a time.\n" + (data.message||"請稍後再試"));
      return;
    }
    if (data.error) {
      _finish(false);
      alert("分析失敗：" + data.error);
      return;
    }

    // Poll until done
    _startPolling(vidId, btn, _finish);

  } catch(e) {
    _finish(false);
    alert("錯誤：" + e.message);
  }
}

// ── Persistent pending state ──────────────────────────────────────────────────
const LS_KEY = "gemini_pending";

function _setPending(vidId, pending) {
  const set = new Set(JSON.parse(localStorage.getItem(LS_KEY)||"[]"));
  pending ? set.add(vidId) : set.delete(vidId);
  localStorage.setItem(LS_KEY, JSON.stringify([...set]));
}

function _getPending() {
  return JSON.parse(localStorage.getItem(LS_KEY)||"[]");
}

function _startPolling(vidId, btn, onFinish) {
  const poll = setInterval(async () => {
    try {
      const s = await fetch(`/ebcshow/status?id=${vidId}`).then(r=>r.json());
      if (s.status === "done") {
        clearInterval(poll);
        onFinish(true);
        await loadData();
      } else if (s.status === "error") {
        clearInterval(poll);
        onFinish(false);
        alert("Gemini 分析失敗，請確認 API 點數是否充足");
      }
    } catch(e) {}
  }, 3000);
}

// On page load: resume polling for any pending jobs
async function _resumePending() {
  const pending = _getPending();
  if (!pending.length) return;
  for (const vidId of pending) {
    // Find the button for this video
    const btn = document.querySelector(`[data-vid="${vidId}"]`);
    if (!btn) continue;
    btn.disabled = true;
    btn.textContent = "AI 分析中 請稍後";
    btn.style.cssText = "background:#1e1040;color:#c084fc;border:1px solid #7c3aed55;";
    const onFinish = (success) => {
      _geminiRunning = false;
      _setPending(vidId, false);
      if (success) {
        btn.textContent = "✓ 完成";
        btn.style.cssText = "background:#0d2a1a;color:#3fb950;border:1px solid #23863655;";
      } else {
        btn.disabled = false; btn.textContent = "▶ 立即分析"; btn.style.cssText = "";
      }
    };
    _geminiRunning = true;
    _startPolling(vidId, btn, onFinish);
  }
}

// ── Stock → Profile feature ───────────────────────────────────────────────────
let _profilesCache = null;

async function _loadProfilesData() {
  if (_profilesCache) return _profilesCache;
  try {
    _profilesCache = await fetch("/profiles").then(r => r.json());
  } catch(e) { _profilesCache = {}; }
  return _profilesCache;
}

async function clickStock(sym, isTW, event) {
  event.stopPropagation();
  // Close any existing popup
  document.querySelectorAll(".sap").forEach(el => el.remove());

  const profiles = await _loadProfilesData();
  const names = Object.keys(profiles);

  const popup = document.createElement("div");
  popup.className = "sap";

  if (!names.length) {
    popup.innerHTML = `<div class="sap-title">${isTW?"🇹🇼":"🇺🇸"} ${sym}</div>
      <div class="sap-empty">尚無投資組合</div>`;
  } else {
    const items = names.map(name => {
      const stocks = (profiles[name].stocks||[]).map(s=>s.toUpperCase());
      const inProf = stocks.includes(sym.toUpperCase());
      return `<div class="sap-item ${inProf?"sap-in":"sap-add"}" data-name="${name}" data-sym="${sym}" data-tw="${isTW}" onclick="toggleStock(this)">
        <span class="sap-name">${name}</span>
        <span class="sap-status">${inProf?"✓ 已在組合":"＋ 加入組合"}</span>
      </div>`;
    }).join("");
    popup.innerHTML = `<div class="sap-title">${isTW?"🇹🇼":"🇺🇸"} ${sym}</div>${items}`;
  }

  // Position popup near clicked element
  const r = event.target.getBoundingClientRect();
  let top = r.bottom + 6, left = r.left;
  popup.style.top  = Math.min(top,  window.innerHeight - 200) + "px";
  popup.style.left = Math.min(left, window.innerWidth  - 200) + "px";
  document.body.appendChild(popup);

  // Close on outside click
  setTimeout(() => document.addEventListener("click", () =>
    document.querySelectorAll(".sap").forEach(el => el.remove()), {once:true}), 50);
}

async function toggleStock(el) {
  const name  = el.dataset.name;
  const sym   = el.dataset.sym;
  const inProf = el.classList.contains("sap-in");
  el.style.opacity = ".5";

  try {
    const data   = await fetch(`/profiles/${encodeURIComponent(name)}`).then(r=>r.json());
    let stocks   = [...(data.stocks||[])];
    const idx    = stocks.map(s=>s.toUpperCase()).indexOf(sym.toUpperCase());

    if (inProf && idx >= 0) {
      stocks.splice(idx, 1);   // remove
    } else if (!inProf) {
      stocks.push(sym);         // add
      localStorage.setItem("profile_needs_sync", "1");  // notify profile page
    }

    await fetch(`/profiles/${encodeURIComponent(name)}`, {
      method:"PUT", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({stocks})
    });

    // Update UI
    const nowIn = !inProf;
    el.className = "sap-item " + (nowIn ? "sap-in" : "sap-add");
    el.querySelector(".sap-status").textContent = nowIn ? "✓ 已在組合" : "＋ 加入組合";
    // Invalidate cache so next click re-fetches
    _profilesCache = null;
  } catch(e) {
    alert("操作失敗：" + e.message);
  }
  el.style.opacity = "1";
}

loadData().then(_resumePending);
</script>
