<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#161b22"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="股票分析"/>
  <link rel="manifest" href="/static/manifest.json"/>
  <link rel="apple-touch-icon" href="/static/icon-192.png"/>
  <title>股票分析工具</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0d1117; --bg2: #161b22; --bg3: #21262d;
      --border: #30363d; --text: #e6edf3; --muted: #8b949e; --dim: #484f58;
      --blue:   #58a6ff; --green: #3fb950; --red: #f85149;
      --yellow: #e3b341; --purple: #d2a8ff; --orange: #f0883e;
      --topbar-h: 54px; --bottombar-h: 100px;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: "Helvetica Neue", Arial, "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── topbar ── */
    .topbar {
      height: var(--topbar-h); min-height: var(--topbar-h);
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0 1rem;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 10;
    }
    .topbar-title {
      font-size: 1rem; font-weight: 700; color: var(--blue);
      white-space: nowrap; flex-shrink: 0;
    }
    .topbar-profile-pill {
      flex: 1; min-width: 0;
      display: flex; align-items: center; gap: 0.4rem;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 20px; padding: 0.3rem 0.75rem;
      cursor: pointer; overflow: hidden;
    }
    .topbar-profile-pill span {
      font-size: 0.85rem; font-weight: 600; color: var(--blue);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .topbar-profile-pill .no-profile { color: var(--dim); font-weight: 400; }
    .icon-btn {
      background: none; border: none; color: var(--muted);
      width: 40px; height: 40px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
      transition: background 0.12s, color 0.12s;
    }
    .icon-btn:active { background: var(--bg3); color: var(--text); }

    /* ── drawer overlay ── */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 40; display: none; opacity: 0;
      transition: opacity 0.22s;
    }
    .drawer-overlay.open { display: block; opacity: 1; }

    /* ── drawer ── */
    .drawer {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 80vw; max-width: 300px;
      background: var(--bg2); border-right: 1px solid var(--border);
      z-index: 50; display: flex; flex-direction: column;
      transform: translateX(-100%); transition: transform 0.22s ease;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-header {
      height: var(--topbar-h); display: flex; align-items: center;
      justify-content: space-between; padding: 0 1rem;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .drawer-header h2 { font-size: 0.9rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .drawer-body { flex: 1; overflow-y: auto; padding: 0.4rem 0; }
    .profile-item {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1rem; cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.12s;
    }
    .profile-item:active, .profile-item.active { background: #1f6feb18; border-left-color: var(--blue); }
    .profile-item.active .profile-item-name { color: var(--blue); }
    .profile-item-info { flex: 1; min-width: 0; }
    .profile-item-name { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .profile-item-meta { font-size: 0.72rem; color: var(--dim); margin-top: 0.1rem; }
    .profile-item-del { color: var(--dim); font-size: 0.9rem; padding: 0.25rem 0.4rem; border-radius: 4px; }
    .profile-item-del:active { color: var(--red); background: #3d1515; }
    .drawer-footer {
      padding: 0.75rem; border-top: 1px solid var(--border); flex-shrink: 0;
      display: flex; flex-direction: column; gap: 0.5rem;
    }

    /* ── new profile form in drawer ── */
    .new-form { display: none; flex-direction: column; gap: 0.4rem; }
    .new-form.visible { display: flex; }
    .new-form input, .search-input {
      width: 100%; padding: 0.55rem 0.8rem;
      border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg3); color: var(--text);
      font-size: 16px; /* prevent iOS zoom */ outline: none;
    }
    .new-form input:focus, .search-input:focus { border-color: var(--blue); }
    .new-form input::placeholder, .search-input::placeholder { color: var(--dim); }
    .row { display: flex; gap: 0.4rem; }
    .row button { flex: 1; }

    /* ── pull-to-refresh indicator ── */
    .ptr-bar {
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
      height: 0; overflow: hidden;
      background: var(--bg2); border-bottom: 1px solid transparent;
      font-size: 0.8rem; color: var(--muted);
      transition: height 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .ptr-bar.pulling  { border-color: var(--border); }
    .ptr-bar.ready    { color: var(--green); border-color: var(--green); }
    .ptr-arrow { display: inline-block; transition: transform 0.2s; }
    .ptr-bar.ready .ptr-arrow { transform: rotate(180deg); }

    /* ── main scroll area ── */
    .main {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 0.75rem; padding-bottom: calc(var(--bottombar-h) + 0.75rem);
      -webkit-overflow-scrolling: touch;
    }

    /* ── search bar (shown when no profile active) ── */
    .search-bar {
      display: flex; gap: 0.5rem; margin-bottom: 0.75rem;
    }
    .search-bar.hidden { display: none; }

    /* ── profile panel (shown when profile active) ── */
    .profile-panel {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 0.75rem;
      display: none;
    }
    .profile-panel.visible { display: block; }
    .profile-panel-top {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.65rem 0.75rem; flex-wrap: wrap;
    }
    .profile-panel-name { font-size: 1rem; font-weight: 700; color: var(--blue); flex: 1; }
    .sync-time { font-size: 0.7rem; color: var(--dim); width: 100%; padding: 0 0.75rem 0.4rem; }
    /* folded profile panel hides chips + add-stock row */
    .profile-panel.folded .chip-wrap,
    .profile-panel.folded .chip-add-wrap { display: none; }

    /* chips */
    .chip-wrap {
      display: flex; flex-wrap: wrap; gap: 0.3rem;
      padding: 0 0.75rem 0.6rem;
    }
    .chip {
      display: inline-flex; align-items: center; gap: 0.2rem;
      background: #1f6feb18; border: 1px solid #1f6feb44;
      color: var(--blue); border-radius: 20px;
      padding: 0.15rem 0.45rem 0.15rem 0.55rem;
      font-size: 0.78rem; font-weight: 600;
    }
    .chip button {
      background: none; border: none; color: var(--dim);
      font-size: 0.7rem; line-height: 1; padding: 0; cursor: pointer;
    }
    .chip-add-wrap {
      padding: 0 0.75rem 0.65rem;
      display: flex; gap: 0.4rem;
    }
    .chip-add-wrap input {
      flex: 1; padding: 0.45rem 0.7rem;
      border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg3); color: var(--text);
      font-size: 16px; outline: none;
    }
    .chip-add-wrap input:focus { border-color: var(--blue); }

    /* ── buttons ── */
    .btn {
      padding: 0.55rem 1rem; border-radius: 8px; border: none;
      font-size: 0.88rem; font-weight: 600; cursor: pointer;
      white-space: nowrap; display: inline-flex; align-items: center;
      justify-content: center; gap: 0.3rem; min-height: 40px;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.75; }
    .btn:disabled { opacity: 0.4; }
    .btn-green  { background: #238636; color: #fff; }
    .btn-blue   { background: #1f6feb; color: #fff; }
    .btn-ghost  { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
    .btn-sync   { background: #0d2a1a; color: var(--green); border: 1px solid #23863666; }
    .btn-danger { background: #3d1515; color: var(--red); border: 1px solid #6e1a1a44; }
    .btn-full   { width: 100%; }
    .btn-sm     { padding: 0.38rem 0.7rem; font-size: 0.8rem; min-height: 34px; }

    /* ── spinner / error ── */
    .spinner {
      display: none;
      justify-content: center;
      align-items: center;
      padding: 0.5rem 0;
    }
    .spinner.visible { display: flex; }
    .spinner-ring {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin-ring 0.75s linear infinite;
    }
    @keyframes spin-ring { to { transform: rotate(360deg); } }
    .error-msg {
      background: #1c1c1c; border: 1px solid #3d1515;
      border-radius: 8px; padding: 0.65rem 1rem;
      color: var(--red); font-size: 0.88rem; margin-bottom: 0.75rem;
      display: none;
    }
    .empty-state { text-align: center; color: var(--dim); padding: 3rem 1rem; font-size: 0.9rem; }

    /* ── stock cards ── */
    .card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 0.65rem; overflow: hidden;
    }
    .card-top {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.65rem 0.75rem;
    }
    .symbol-badge {
      background: #1f6feb22; border: 1px solid #1f6feb55;
      color: var(--blue); border-radius: 6px;
      padding: 0.2rem 0.5rem; font-weight: 700;
      font-size: 0.9rem; letter-spacing: 0.03em; white-space: nowrap;
    }
    .card-names { flex: 1; min-width: 0; }
    .card-company { font-size: 0.72rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rec-badge {
      padding: 0.2rem 0.55rem; border-radius: 6px;
      font-weight: 700; font-size: 0.78rem; white-space: nowrap;
    }
    .rec-strong-buy { background: #0d2a1a; color: var(--green); border: 1px solid #238636; }
    .rec-buy        { background: #0d2a1a; color: #56d364;      border: 1px solid #2ea04366; }
    .rec-hold       { background: #1c2128; color: var(--yellow); border: 1px solid #9e6a0366; }
    .rec-under      { background: #2d1f0e; color: var(--orange); border: 1px solid #bd561266; }
    .rec-sell       { background: #3d1515; color: var(--red);   border: 1px solid #6e1a1a; }

    /* price row */
    .card-price {
      display: flex; align-items: baseline; gap: 0.6rem;
      padding: 0 0.75rem 0.55rem; flex-wrap: wrap;
    }
    .price-now  { font-size: 1.25rem; font-weight: 700; }
    .price-target { font-size: 0.85rem; color: var(--muted); }
    .price-up   { color: var(--green); }
    .price-dn   { color: var(--red); }

    /* key metrics row */
    .metrics {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: var(--border);
      border-top: 1px solid var(--border);
    }
    .metric {
      background: var(--bg2); padding: 0.4rem 0.5rem;
      display: flex; flex-direction: column; align-items: center; gap: 0.1rem;
    }
    .metric-label { font-size: 0.62rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.04em; }
    .metric-val   { font-size: 0.82rem; font-weight: 600; }

    .rsi-hot  { color: var(--red); }
    .rsi-warm { color: var(--green); }
    .rsi-cold { color: #79c0ff; }
    .rsi-norm { color: var(--muted); }
    .macd-bull { color: var(--green); }
    .macd-bear { color: var(--red); }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .na  { color: var(--dim); }

    /* comment */
    .card-comment {
      padding: 0.45rem 0.75rem; font-size: 0.78rem;
      color: var(--muted); line-height: 1.5;
      border-top: 1px solid var(--bg3);
    }

    /* expandable extra metrics */
    .card-more-btn {
      width: 100%; background: none; border: none;
      border-top: 1px solid var(--bg3);
      color: #79c0ff; font-size: 0.78rem; padding: 0.4rem;
      cursor: pointer; text-align: center;
    }
    .card-more-btn:active { background: var(--bg3); }
    /* ── Mobile news section ── */
    .m-news-section { padding:.5rem .75rem .4rem; border-top:1px solid var(--border); }
    .m-news-title   { font-size:.65rem; font-weight:700; color:var(--dim);
                      text-transform:uppercase; letter-spacing:.05em; margin-bottom:.35rem; }
    .m-news-item    { display:flex; align-items:baseline; gap:.35rem;
                      padding:.25rem 0; border-bottom:1px solid var(--bg3); font-size:.76rem; }
    .m-news-item:last-child { border-bottom:none; }
    .m-news-item a  { flex:1; color:var(--text); text-decoration:none;
                      overflow:hidden; display:-webkit-box;
                      -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .m-news-item a:active { color:var(--blue); }
    .m-news-meta    { display:flex; flex-direction:column; align-items:flex-end;
                      gap:.1rem; flex-shrink:0; }
    .m-news-src     { font-size:.62rem; color:var(--dim); background:var(--bg3);
                      border-radius:3px; padding:.02rem .28rem; white-space:nowrap; }
    .m-news-time    { font-size:.62rem; color:var(--dim); white-space:nowrap; }
    .m-news-loading { display:flex; align-items:center; gap:.35rem;
                      font-size:.74rem; color:var(--dim); }

    /* ── Momentum score badge ── */
    .score-badge { display:inline-block; min-width:1.8rem; text-align:center;
                   font-size:.65rem; font-weight:800; padding:.06rem .28rem;
                   border-radius:4px; margin-right:.15rem; vertical-align:middle; }
    .score-s3  { background:#071a10; color:#3fb950; border:1px solid #238636; }
    .score-s2  { background:#0d2a1a; color:#3fb950; }
    .score-s1  { background:#1a2b1a; color:#7ee787; }
    .score-s0  { background:var(--bg3); color:var(--dim); }
    .score-sm1 { background:#2d1515; color:#f85149; }
    .score-sm2 { background:#3d1515; color:#f85149; }
    /* ── Signal chips ── */
    .sig-chip { display:inline-block; font-size:.65rem; font-weight:700;
                padding:.08rem .3rem; border-radius:4px; white-space:nowrap; margin:.08rem .08rem 0 0; }
    .sig-bull { background:#0d2a1a; color:#3fb950; }
    .sig-bear { background:#3d1515; color:#f85149; }
    .sig-warn { background:#2d1f0e; color:#e3b341; }
    /* ── Fair Value mini panel ── */
    .fv-mini-wrap { background:var(--bg3); border-radius:6px;
                    padding:.35rem .5rem; margin:.3rem 0; }
    .fv-mini-title{ font-size:.62rem; color:var(--dim); font-weight:700;
                    text-transform:uppercase; letter-spacing:.04em; margin-bottom:.25rem; }
    .fv-mini-row  { display:flex; align-items:center; gap:.4rem;
                    font-size:.74rem; padding:.1rem 0; }
    .fv-mini-m    { color:var(--dim); font-size:.65rem; min-width:3.2rem; font-weight:600; }
    .fv-mini-p    { font-weight:700; color:#d2a8ff; flex:1; }
    .fv-mini-up   { color:#3fb950; font-size:.7rem; }
    .fv-mini-dn   { color:#f85149; font-size:.7rem; }
    .fv-mini-na   { color:var(--dim); font-size:.7rem; }

    /* ── Sortable metric rectangles ── */
    .sort-metric { cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .sort-metric:active { background:var(--bg3) !important; }
    .sort-sym-area { cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .sort-price-area { cursor:pointer; -webkit-tap-highlight-color:transparent; }

    /* ── Mobile stock autocomplete ── */
    .m-ac-wrap  { position:relative; flex:1; }
    .m-ac-drop  { position:absolute; top:calc(100% + 3px); left:0; right:0;
                  background:var(--bg2); border:1px solid var(--border); border-radius:8px;
                  box-shadow:0 6px 18px rgba(0,0,0,.45); z-index:300;
                  max-height:210px; overflow-y:auto; display:none; }
    .m-ac-drop.open { display:block; }
    .m-ac-item  { display:flex; align-items:center; gap:.5rem;
                  padding:.45rem .75rem; cursor:pointer; }
    .m-ac-item:active,.m-ac-item.active { background:var(--bg3); }
    .m-ac-sym   { font-weight:700; color:var(--blue); font-size:.85rem;
                  min-width:3.5rem; white-space:nowrap; }
    .m-ac-name  { font-size:.76rem; color:var(--muted); overflow:hidden;
                  text-overflow:ellipsis; white-space:nowrap; flex:1; }

    /* ── Section index bar ── */
    .idx-bar {
      position: fixed; right: 3px;
      top: calc(var(--topbar-h) + 4px);
      bottom: calc(var(--bottombar-h) + 4px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 50; gap: 4px; pointer-events: none;
    }
    .idx-btn {
      font-size: 12px; font-weight: 700; line-height: 1.3;
      color: var(--blue); background: rgba(13,17,23,.55);
      border: none; padding: 2px 6px; border-radius: 3px;
      cursor: pointer; pointer-events: all;
      -webkit-tap-highlight-color: transparent;
    }
    .idx-btn:active { background: var(--blue); color: #fff; }
    /* nudge card list left so last column isn't hidden under bar */
    #cardList { padding-right: 22px; }

    .ma-card-btn {
      width:100%; background:none; border:none; border-top:1px solid var(--bg3);
      color:var(--green); font-size:.8rem; font-weight:600; padding:.42rem;
      cursor:pointer; text-align:center;
    }
    .ma-card-btn:active { background:var(--bg3); }

    /* MA modal (bottom sheet) */
    .ma-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:300;
                  display:none; align-items:flex-end; justify-content:center; }
    .ma-overlay.open { display:flex; }
    .ma-modal  { background:var(--bg2); border:1px solid var(--border);
                 border-radius:14px 14px 0 0; width:100%; max-height:88vh;
                 display:flex; flex-direction:column; overflow:hidden; }
    .ma-header { display:flex; align-items:center; gap:.5rem;
                 padding:.65rem .9rem; border-bottom:1px solid var(--border); }
    .ma-header h2 { font-size:.88rem; font-weight:700; color:var(--blue); flex:1; }
    .ma-close  { background:none; border:none; color:var(--muted); cursor:pointer;
                 font-size:1.1rem; padding:.2rem .5rem; }
    .ma-controls { display:flex; flex-wrap:wrap; gap:.4rem;
                   padding:.5rem .75rem; border-bottom:1px solid var(--border); }
    .ma-period { display:flex; gap:.3rem; }
    .ma-period button { padding:.22rem .55rem; border-radius:5px; border:1px solid var(--border);
                        background:none; color:var(--muted); cursor:pointer; font-size:.76rem; font-weight:600; }
    .ma-period button.active { background:var(--blue); color:#fff; border-color:var(--blue); }
    .ma-presets { display:flex; gap:.3rem; flex-wrap:wrap; width:100%; }
    .ma-preset  { flex:1; min-width:0; padding:.28rem .4rem; border-radius:6px;
                  border:1px solid var(--border); background:none; color:var(--muted);
                  cursor:pointer; font-size:.72rem; font-weight:600; text-align:center; white-space:nowrap; }
    .ma-preset.active { background:var(--bg3); color:var(--text); border-color:var(--muted); }
    .ma-info   { font-size:.68rem; color:var(--dim); width:100%; }
    .ma-body   { flex:1; min-height:260px; padding:.6rem .75rem; }
    .card-extra {
      display: none; background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .card-extra.open { display: block; }
    .extra-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 1px; background: var(--border);
    }

    /* ── List view ── */
    .list-view-wrap { border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .list-row {
      display:flex; align-items:center; gap:0.4rem;
      padding:0.42rem 0.65rem; border-bottom:1px solid var(--border);
      background:var(--bg2); min-width:0;
    }
    .list-row:last-child { border-bottom:none; }
    .list-row:active { background:var(--bg3); }
    .list-sym  { font-weight:700; color:var(--blue); font-size:0.82rem;
                 white-space:nowrap; min-width:2.6rem; }
    .list-name { flex:1; font-size:0.7rem; color:var(--muted);
                 overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
    .list-price { font-weight:700; font-size:0.85rem; white-space:nowrap; }
    .list-chg   { font-size:0.75rem; font-weight:600; white-space:nowrap;
                  min-width:3.8rem; text-align:right; }
    .list-target{ font-size:0.7rem; color:var(--dim); white-space:nowrap;
                  min-width:3rem; text-align:right; }
    .list-err { padding:0.5rem 0.75rem; color:var(--red); font-size:0.78rem;
                background:var(--bg2); border-bottom:1px solid var(--border); }
    .view-toggle-btn.active { background:var(--bg3); color:var(--text); border-color:var(--muted); }

    /* ── bottom action bar ── */
    .bottombar {
      background: var(--bg2); border-top: 1px solid var(--border);
      display: grid; grid-template-columns: repeat(3, 1fr);
      padding: 0.15rem 0; flex-shrink: 0; z-index: 10;
    }
    .bottom-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 0.12rem; background: none; border: none;
      color: var(--muted); cursor: pointer; padding: 0.35rem 0.25rem;
      border-radius: 8px; transition: color 0.12s, background 0.12s;
      font-size: 0.62rem; font-weight: 600; text-decoration: none;
      line-height: 1.2; text-align: center;
    }
    .bottom-btn .ico { font-size: 1.15rem; }
    .bottom-btn:active { background: var(--bg3); color: var(--text); }
    .bottom-btn.active { color: var(--blue); }

    /* ── modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 60; display: none; align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      width: 100%; background: var(--bg2);
      border-radius: 16px 16px 0 0; border-top: 1px solid var(--border);
      padding: 1.25rem 1rem 2rem; display: flex; flex-direction: column; gap: 0.75rem;
    }
    .modal h3 { font-size: 1rem; }
    .modal-btns { display: flex; gap: 0.5rem; }
    .modal-btns button { flex: 1; }

    /* ── theme picker (bottom sheet style on mobile) ── */
    .theme-sheet-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 70; display: none;
    }
    .theme-sheet-overlay.open { display: block; }
    .theme-sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      background: var(--bg2); border-radius: 16px 16px 0 0;
      border-top: 1px solid var(--border);
      padding: 1rem 1rem 2rem; z-index: 71;
      transform: translateY(100%); transition: transform 0.22s ease;
    }
    .theme-sheet.open { transform: translateY(0); }
    .theme-sheet h3 { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; }
    .theme-opts { display: flex; gap: 0.6rem; }
    .theme-opt {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
      padding: 0.75rem 0.5rem; border-radius: 10px; cursor: pointer;
      border: 2px solid var(--border); transition: border-color 0.15s;
      font-size: 0.8rem; color: var(--text); font-weight: 600;
    }
    .theme-opt.active { border-color: var(--blue); }
    .swatch {
      width: 32px; height: 32px; border-radius: 50%;
      border: 2px solid var(--border);
    }

    /* ── white theme ── */
    html.theme-white {
      --bg: #ffffff; --bg2: #f6f8fa; --bg3: #eaeef2;
      --border: #d0d7de; --text: #24292f; --muted: #57606a; --dim: #8c959f;
    }
    html.theme-white .rec-strong-buy { background: #dafbe1; border-color: #2da44e88; }
    html.theme-white .rec-buy        { background: #dafbe1; border-color: #2da44e55; }
    html.theme-white .rec-hold       { background: #fff8c5; border-color: #d4a72c88; }
    html.theme-white .rec-under      { background: #fff1d3; border-color: #d4660088; }
    html.theme-white .rec-sell       { background: #ffebe9; border-color: #cf222e88; }
    html.theme-white .symbol-badge   { background: #ddf4ff; border-color: #79c0ff88; }
    html.theme-white .chip           { background: #ddf4ff; border-color: #79c0ff88; }
    html.theme-white .btn-sync  { background: #dafbe1; border-color: #2da44e88; color: #116329; }
    html.theme-white .btn-danger{ background: #ffebe9; border-color: #cf222e88; }

    /* ── light-blue theme ── */
    html.theme-lightblue {
      --bg: #eaf5ff; --bg2: #d7edf9; --bg3: #c2dff0;
      --border: #8abcd8; --text: #0a2742; --muted: #2d6a8a; --dim: #5a90b0;
    }
    html.theme-lightblue .rec-strong-buy { background: #d0f0da; border-color: #2da44e88; }
    html.theme-lightblue .rec-buy        { background: #d0f0da; border-color: #2da44e55; }
    html.theme-lightblue .rec-hold       { background: #fdf3c8; border-color: #d4a72c88; }
    html.theme-lightblue .rec-under      { background: #fde8cc; border-color: #d4660088; }
    html.theme-lightblue .rec-sell       { background: #fdd5d1; border-color: #cf222e88; }
    html.theme-lightblue .symbol-badge   { background: #cce8ff; border-color: #5aacde88; }
    html.theme-lightblue .chip           { background: #cce8ff; border-color: #5aacde88; }
    html.theme-lightblue .btn-sync  { background: #d0f0da; border-color: #2da44e88; color: #116329; }
    html.theme-lightblue .btn-danger{ background: #fdd5d1; border-color: #cf222e88; }


    /* ── light-yellow theme ── */
    html.theme-lightyellow {
      --bg: #fffbe8; --bg2: #fef9df; --bg3: #fdf7d7;
      --border: #f3eac1; --text: #1e1400; --muted: #4a3200; --dim: #8a6a10;
    }
    html.theme-lightyellow .rec-strong-buy { background: #b3e4bf; border-color: #2da44e88; }
    html.theme-lightyellow .rec-buy        { background: #b3e4bf; border-color: #2da44e55; }
    html.theme-lightyellow .rec-hold       { background: #fef9df; border-color: #f3eac188; }
    html.theme-lightyellow .rec-under      { background: #f3d4a6; border-color: #c07000aa; }
    html.theme-lightyellow .rec-sell       { background: #f4b8b1; border-color: #cf222e88; }
    html.theme-lightyellow .symbol-badge   { background: #fef9df; border-color: #f3eac188; }
    html.theme-lightyellow .chip           { background: #fef9df; border-color: #f3eac188; }
    html.theme-lightyellow .btn-sync  { background: #b3e4bf; border-color: #2da44e88; color: #0a4020; }
    html.theme-lightyellow .btn-danger{ background: #f4b8b1; border-color: #cf222e88; }
  </style>
</head>
<body>

<!-- drawer overlay -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- left drawer: profile list -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <h2>投資組合</h2>
    <button class="icon-btn" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer">
    <div class="new-form" id="newForm">
      <input id="newName"   placeholder="組合名稱" maxlength="30"/>
      <input id="newStocks" placeholder="股票代碼（空格分隔，選填）"/>
      <label style="font-size:0.78rem;color:var(--muted);border:1px dashed var(--border);border-radius:6px;padding:0.35rem;text-align:center;cursor:pointer;">
        📂 從 CSV/TXT 匯入
        <input type="file" accept=".csv,.txt" style="display:none" onchange="importFileToNewForm(this)"/>
      </label>
      <div class="row">
        <button class="btn btn-green" onclick="submitNewProfile()">建立</button>
        <button class="btn btn-ghost" onclick="cancelNew()">取消</button>
      </div>
    </div>
    <button class="btn btn-ghost btn-full" onclick="toggleNewForm()">＋ 新增投資組合</button>
  </div>
</div>

<!-- topbar -->
<div class="topbar">
  <span class="topbar-title">📈</span>
  <div class="topbar-profile-pill" onclick="openDrawer()">
    <span>☰</span>
    <span id="topProfileLabel" class="no-profile">選擇投資組合</span>
  </div>
  <button class="icon-btn" id="searchToggleBtn" onclick="toggleSearch()" title="個股查詢">🔍</button>
  <button class="icon-btn" onclick="openThemeSheet()" title="切換主題">🎨</button>
</div>

<!-- theme bottom sheet -->
<div class="theme-sheet-overlay" id="themeSheetOverlay" onclick="closeThemeSheet()"></div>
<div class="theme-sheet" id="themeSheet">
  <h3>選擇主題</h3>
  <div class="theme-opts">
    <div class="theme-opt" data-theme="dark">
      <span class="swatch" style="background:#0d1117;border-color:#58a6ff;"></span>🌙 深色
    </div>
    <div class="theme-opt" data-theme="white">
      <span class="swatch" style="background:#ffffff;border-color:#d0d7de;"></span>☀️ 白色
    </div>
    <div class="theme-opt" data-theme="lightblue">
      <span class="swatch" style="background:#d7edf9;border-color:#8abcd8;"></span>💙 淺藍
    </div>
    <div class="theme-opt" data-theme="lightyellow">
      <span class="swatch" style="background:#fffbe8;border-color:#f3eac1;"></span>🌼 淺黃
    </div>
  </div>
</div>

<!-- main scroll -->
<div class="ptr-bar" id="ptrBar">
  <span class="ptr-arrow">↓</span>
  <span id="ptrText">下拉同步行情</span>
</div>

<div class="main" id="main">

  <!-- search bar (toggle) -->
  <div class="search-bar hidden" id="searchBar">
    <input class="search-input" id="symbolInput" type="text"
           placeholder="AAPL 2330 NVDA…" autocomplete="off"/>
    <button class="btn btn-green" onclick="adhocAnalyze()">查詢</button>
  </div>

  <!-- active profile panel -->
  <div class="profile-panel" id="profilePanel">
    <div class="profile-panel-top">
      <span class="profile-panel-name" id="panelName">—</span>
      <button class="btn btn-ghost btn-sm" id="mPanelConfigBtn" onclick="toggleMobilePanel()" title="管理股票清單">⚙</button>
      <button class="btn btn-sync btn-sm" id="syncBtn" onclick="syncProfile()">⟳ 同步</button>
      <button class="btn btn-ghost btn-sm" id="autoSyncBtn" onclick="toggleAutoSync()" title="每30秒自動同步">⏱ 自動</button>
      <span id="autoSyncCountdown" style="font-size:0.68rem;color:var(--dim);display:none;"></span>
      <button class="btn btn-ghost btn-sm view-toggle-btn" id="viewToggleBtn" onclick="toggleViewMode()">☰ 列表</button>
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()">⬇ CSV</button>
    </div>
    <div id="mMktStatus" style="display:none;padding:0 0.75rem 0.3rem;font-size:0.7rem;display:none;gap:0.4rem;flex-wrap:wrap;"></div>
    <div class="sync-time" id="syncTime"></div>
    <div id="mSrcBadge" style="display:none;padding:0 0.75rem 0.4rem;font-size:0.72rem;font-weight:600;"></div>
    <div class="chip-wrap" id="chipWrap"></div>
    <div class="chip-add-wrap">
      <div class="m-ac-wrap">
        <input id="addStockInput" placeholder="加入股票（如 AAPL）" maxlength="12"
               autocomplete="off"
               oninput="mAcOnInput(this.value)"
               onkeydown="mAcOnKey(event)"
               onfocus="mAcOnInput(this.value)"
               onblur="setTimeout(()=>mAcClose(),180)"/>
        <div class="m-ac-drop" id="mAcDrop"></div>
      </div>
      <button class="btn btn-blue btn-sm" onclick="addStock()">加入</button>
      <button class="btn btn-ghost btn-sm"
              onclick="document.getElementById('importFile').click()">📂</button>
      <input type="file" id="importFile" accept=".csv,.txt"
             style="display:none" onchange="importFileToProfile(this)"/>
    </div>
  </div>

  <div class="spinner" id="spinner"><div class="spinner-ring"></div></div>
  <div class="error-msg" id="errorMsg"></div>
  <div id="cardList">
    <div class="empty-state">點選上方組合或搜尋個股</div>
  </div>
</div>
<div class="idx-bar" id="idxBar"></div>

<!-- bottom action bar -->
<div class="bottombar">
  <button class="bottom-btn" onclick="openDrawer()">
    <span class="ico">📁</span>組合
  </button>
  <a class="bottom-btn" href="/scan" style="text-decoration:none;color:inherit;">
    <span class="ico">🔍</span>掃描
  </a>
  <a class="bottom-btn" href="/serenity" style="text-decoration:none;color:inherit;">
    <span class="ico">⚡</span>Serenity
  </a>
  <a class="bottom-btn" href="/market" style="text-decoration:none;color:inherit;">
    <span class="ico">📊</span>市場
  </a>
  <a class="bottom-btn" href="/options" style="text-decoration:none;color:inherit;">
    <span class="ico">📋</span>選擇權
  </a>
  <a class="bottom-btn" href="/desktop" style="text-decoration:none;color:inherit;">
    <span class="ico">🖥</span>桌面版
  </a>
</div>

<!-- delete confirm modal (slides up from bottom) -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>刪除「<span id="deleteModalName"></span>」？</h3>
    <p style="font-size:0.85rem;color:var(--muted);">此操作無法復原。</p>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeDeleteModal()">取消</button>
      <button class="btn btn-danger" onclick="confirmDelete()">確定刪除</button>
    </div>
  </div>
</div>

<script>
/* ── state ── */
let activeProfile  = null;
let profilesData   = {};
let currentResults = [];
let searchVisible  = false;
let _prevPrices    = {};

/* ── init ── */
document.getElementById("symbolInput")
  .addEventListener("keydown", e => { if (e.key==="Enter") adhocAnalyze(); });
loadProfiles();
if ("serviceWorker" in navigator)
  navigator.serviceWorker.register("/static/sw.js").catch(()=>{});

/* ── profiles ── */
async function loadProfiles() {
  const res = await fetch("/profiles");
  profilesData = await res.json();
  renderDrawer();
}

function renderDrawer() {
  const body  = document.getElementById("drawerBody");
  const names = Object.keys(profilesData);
  if (!names.length) {
    body.innerHTML = `<div style="padding:1rem;font-size:0.82rem;color:var(--dim);">尚無投資組合</div>`;
    return;
  }
  body.innerHTML = names.map(name => {
    const p    = profilesData[name];
    const sync = p.last_sync ? p.last_sync.slice(5,16) : "未同步";
    const act  = name === activeProfile;
    return `
      <div class="profile-item ${act?"active":""}" data-name="${esc(name)}">
        <div class="profile-item-info">
          <div class="profile-item-name">${esc(name)}</div>
          <div class="profile-item-meta">${p.stocks.length} 檔 · ${sync}</div>
        </div>
      </div>`;
  }).join("");

  body.querySelectorAll(".profile-item").forEach(el => {
    el.addEventListener("click", e => {
      if (e.target.dataset.del) { openDeleteModal(e.target.dataset.del); return; }
      selectProfile(el.dataset.name);
      closeDrawer();
    });
  });
}

/* ── select profile ── */
async function selectProfile(name) {
  stopAutoSync();
  activeProfile = name;
  renderDrawer();
  document.getElementById("topProfileLabel").textContent = name;
  document.getElementById("topProfileLabel").classList.remove("no-profile");
  document.getElementById("panelName").textContent = name;
  document.getElementById("profilePanel").classList.add("visible");
  _foldMobilePanel();     // always start folded
  updateMarketStatus();

  const res  = await fetch(`/profiles/${encodeURIComponent(name)}`);
  const data = await res.json();
  if (data.error) { showError(data.error); return; }
  renderChips(data.stocks);
  document.getElementById("syncTime").textContent = data.last_sync ? `上次同步：${data.last_sync}` : "";
  if (data.cache && data.cache.length) { renderResults(data.cache); updateSourceBadge(data.cache); }
  else document.getElementById("cardList").innerHTML = `<div class="empty-state">尚未同步，請按「⟳ 同步」</div>`;
}

function renderChips(stocks) {
  document.getElementById("chipWrap").innerHTML = (stocks||[]).map(s => `
    <span class="chip">${esc(s)}
      <button data-sym="${esc(s)}" onclick="removeStock(this.dataset.sym)">✕</button>
    </span>`).join("");
}

/* ── sync ── */
async function syncProfile() {
  if (!activeProfile) { showError("請先選擇投資組合"); return; }
  const btn = document.getElementById("syncBtn");
  btn.disabled = true; btn.textContent = "…";
  showSpinner(true); clearError();
  try {
    const res  = await fetch(`/profiles/${encodeURIComponent(activeProfile)}/sync`, {method:"POST"});
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    profilesData[activeProfile].last_sync = data.last_sync;
    renderDrawer();
    document.getElementById("syncTime").textContent = `上次同步：${data.last_sync}`;
    renderResults(data.results);
    updateSourceBadge(data.results);
  } catch { showError("同步失敗"); }
  finally { btn.disabled=false; btn.textContent="⟳ 同步"; showSpinner(false); }
}

/* ── add / remove stock ── */
async function addStock() {
  if (!activeProfile) return;
  const inp = document.getElementById("addStockInput");
  const sym = inp.value.trim().toUpperCase();
  if (!sym) return;
  const stocks = profilesData[activeProfile].stocks;
  if (stocks.includes(sym)) { inp.value=""; return; }
  const newStocks = [...stocks, sym];
  const res = await fetch(`/profiles/${encodeURIComponent(activeProfile)}`, {
    method:"PUT", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({stocks: newStocks})
  });
  const data = await res.json();
  if (data.error) { showError(data.error); return; }
  profilesData[activeProfile].stocks = newStocks;
  renderChips(newStocks); renderDrawer(); inp.value="";
}

async function removeStock(sym) {
  if (!activeProfile) return;
  const newStocks = profilesData[activeProfile].stocks.filter(s=>s!==sym);
  const res = await fetch(`/profiles/${encodeURIComponent(activeProfile)}`, {
    method:"PUT", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({stocks: newStocks})
  });
  const data = await res.json();
  if (data.error) { showError(data.error); return; }
  profilesData[activeProfile].stocks = newStocks;
  renderChips(newStocks); renderDrawer();
}

/* ── ad-hoc search ── */
async function adhocAnalyze() {
  const symbols = document.getElementById("symbolInput").value.trim();
  if (!symbols) return;
  activeProfile = null;
  document.getElementById("topProfileLabel").textContent = "選擇投資組合";
  document.getElementById("topProfileLabel").classList.add("no-profile");
  document.getElementById("profilePanel").classList.remove("visible");
  renderDrawer();
  showSpinner(true); clearError();
  try {
    const res  = await fetch("/analyze", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({symbols})
    });
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    renderResults(data.results);
    toggleSearch(false);
  } catch { showError("查詢失敗"); }
  finally { showSpinner(false); }
}

/* ── create profile ── */
function toggleNewForm() {
  const f = document.getElementById("newForm");
  f.classList.toggle("visible");
  if (f.classList.contains("visible")) document.getElementById("newName").focus();
}
function cancelNew() {
  document.getElementById("newForm").classList.remove("visible");
  document.getElementById("newName").value = "";
  document.getElementById("newStocks").value = "";
}
async function submitNewProfile() {
  const name   = document.getElementById("newName").value.trim();
  const raw    = document.getElementById("newStocks").value;
  const stocks = raw.replace(/,/g," ").split(/\s+/).filter(Boolean).map(s=>s.toUpperCase());
  if (!name) { document.getElementById("newName").focus(); return; }
  const res  = await fetch("/profiles", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({name, stocks})
  });
  const data = await res.json();
  if (data.error) { showError(data.error); return; }
  profilesData[name] = {stocks, last_sync: null};
  cancelNew(); renderDrawer(); selectProfile(name); closeDrawer();
}

/* ── delete profile ── */
let pendingDelete = null;
function openDeleteModal(name) {
  pendingDelete = name;
  document.getElementById("deleteModalName").textContent = name;
  document.getElementById("deleteModal").classList.add("open");
}
function closeDeleteModal() {
  document.getElementById("deleteModal").classList.remove("open");
  pendingDelete = null;
}
async function confirmDelete() {
  const name = pendingDelete; closeDeleteModal();
  if (!name) return;
  const res  = await fetch(`/profiles/${encodeURIComponent(name)}`, {method:"DELETE"});
  const data = await res.json();
  if (data.error) { showError(data.error); return; }
  delete profilesData[name];
  if (activeProfile === name) {
    activeProfile = null;
    document.getElementById("topProfileLabel").textContent = "選擇投資組合";
    document.getElementById("topProfileLabel").classList.add("no-profile");
    document.getElementById("profilePanel").classList.remove("visible");
    document.getElementById("cardList").innerHTML = `<div class="empty-state">點選上方組合或搜尋個股</div>`;
  }
  renderDrawer();
}

/* ── drawer ── */
function openDrawer() {
  document.getElementById("drawer").classList.add("open");
  document.getElementById("drawerOverlay").classList.add("open");
}
function closeDrawer() {
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("drawerOverlay").classList.remove("open");
}

/* ── search toggle ── */
function toggleSearch(force) {
  searchVisible = (force !== undefined) ? force : !searchVisible;
  document.getElementById("searchBar").classList.toggle("hidden", !searchVisible);
  if (searchVisible) document.getElementById("symbolInput").focus();
}

/* ── CSV export ── */
function exportCSV() {
  const rows = currentResults.filter(r => !r.error);
  if (!rows.length) { showError("尚無資料可匯出，請先同步行情。"); return; }
  const HEADERS = ["股票代碼","公司名稱","目前市價","目標價","漲幅%","前瞻PE","PEG","RSI","MACD","距52W高%","財報日","營收成長YoY","分析師數","買入%","投資建議","核心評論"];
  const escape = v => { const s=String(v??""); return (s.includes(",")||s.includes('"')||s.includes("\n")) ? `"${s.replace(/"/g,'""')}"` : s; };
  const lines = [HEADERS.join(","), ...rows.map(r=>[
    r.display_symbol||r.symbol, r.company_name, r.current_price_fmt,
    r.target_price_fmt, r.upside_pct!=null?`${r.upside_pct>0?"+":""}${r.upside_pct}%`:"N/A",
    r.forward_pe_fmt, r.peg_fmt, r.rsi_fmt, r.macd_label,
    r.pct_from_52w_high_fmt, r.next_earnings_fmt, r.rev_growth_fmt,
    r.n_analysts??"N/A", r.buy_pct!=null?`${r.buy_pct}%`:"N/A",
    r.recommendation, r.comment
  ].map(escape).join(","))];
  const blob = new Blob(["﻿"+lines.join("\r\n")], {type:"text/csv;charset=utf-8;"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${activeProfile||"stock"}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(a.href);
}

/* ── file import ── */
const HEADER_WORDS = new Set(["ticker","symbol","stock","name","代碼","股票"]);
function parseSymbols(text, filename) {
  const isCSV = filename.toLowerCase().endsWith(".csv");
  const seen=new Set(), out=[];
  for (const rawLine of text.split(/\r?\n/)) {
    const tokens = isCSV ? [rawLine.split(",")[0]] : rawLine.split(/[\s,;\t]+/);
    for (const t of tokens) {
      const s = t.trim().replace(/^["']|["']$/g,"").toUpperCase();
      if (!s || HEADER_WORDS.has(s.toLowerCase())) continue;
      if (!/^[A-Z][A-Z0-9.\-]{0,9}$/.test(s) && !/^\d{4,6}[A-Z]{0,2}$/.test(s)) continue;
      if (!seen.has(s)) { seen.add(s); out.push(s); }
    }
  }
  return out;
}
function readFile(file) {
  return new Promise((ok,fail)=>{
    const r=new FileReader();
    r.onload=e=>ok(e.target.result);
    r.onerror=()=>fail(new Error("讀取失敗"));
    r.readAsText(file);
  });
}
async function importFileToNewForm(inp) {
  if (!inp.files.length) return;
  const file=inp.files[0]; inp.value="";
  const syms=parseSymbols(await readFile(file), file.name);
  if (!syms.length) { showError("找不到有效股票代碼"); return; }
  const existing = document.getElementById("newStocks").value.trim();
  const merged = [...new Set([...existing.split(/\s+/).filter(Boolean), ...syms])];
  document.getElementById("newStocks").value = merged.join(" ");
}
async function importFileToProfile(inp) {
  if (!activeProfile||!inp.files.length) return;
  const file=inp.files[0]; inp.value="";
  const syms=parseSymbols(await readFile(file), file.name);
  if (!syms.length) { showError("找不到有效股票代碼"); return; }
  const newStocks=[...new Set([...profilesData[activeProfile].stocks, ...syms])];
  const res=await fetch(`/profiles/${encodeURIComponent(activeProfile)}`,{
    method:"PUT",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({stocks:newStocks})
  });
  const data=await res.json();
  if (data.error){showError(data.error);return;}
  profilesData[activeProfile].stocks=newStocks;
  renderChips(newStocks); renderDrawer(); clearError();
}

function mScoreBadge(sc) {

  var cls = sc >= 6 ? "score-s3" : sc >= 3 ? "score-s2" : sc >= 1 ? "score-s1"

/* ── Mobile column sort ── */
let _mSortCol = null, _mSortDir = 'desc';
const _M_REC_ORDER = {'強力買入':6,'買入':5,'持有':4,'低配':3,'賣出':2,'強力賣出':1};

function _mGetSortVal(r, col) {
  switch(col) {
    case 'symbol':   return (r.display_symbol||r.symbol||'').toUpperCase();
    case 'price':    return r.current_price;
    case 'chg':      return r.day_chg_pct;
    case 'upside':   return r.upside_pct;
    case 'rsi':      return r.rsi;
    case 'macd':     return r.macd_bullish===true?1:r.macd_bullish===false?0:-1;
    case '52w':      return r.pct_from_52w_high;
    case 'earnings': return r.next_earnings_ts;
    case 'pe':       return r.forward_pe;
    case 'peg':      return r.peg_ratio;
    case 'rev':      return r.rev_growth;
    case 'analyst':  return r.buy_pct;
    case 'rec':      return _M_REC_ORDER[r.recommendation||'']||0;
    default:         return null;
  }
}
function _mApplySortOrder(results) {
  if (!_mSortCol) return results;
  return [...results].sort((a,b) => {
    if (a.error && !b.error) return 1;
    if (!a.error && b.error) return -1;
    if (a.error && b.error)  return 0;
    const va = _mGetSortVal(a,_mSortCol), vb = _mGetSortVal(b,_mSortCol);
    if (va==null && vb==null) return 0;
    if (va==null) return 1; if (vb==null) return -1;
    const cmp = typeof va==='string'
      ? va.localeCompare(vb,undefined,{sensitivity:'base'})
      : va - vb;
    return _mSortDir==='desc' ? -cmp : cmp;
  });
}
function mSortByCol(col) {
  if (_mSortCol===col) _mSortDir = _mSortDir==='desc'?'asc':'desc';
  else { _mSortCol=col; _mSortDir=col==='symbol'?'asc':'desc'; }
  if (currentResults && currentResults.length) renderResults(currentResults);
}
function _mSortIcon(col) {
  if (_mSortCol!==col) return '';
  return _mSortDir==='desc'
    ? '<span style="color:var(--blue);font-size:.65rem;"> ▼</span>'
    : '<span style="color:var(--blue);font-size:.65rem;"> ▲</span>';
}

function buildIndexBar(results) {
  const bar = document.getElementById("idxBar");
  if (!bar) return;
  const initials = [...new Set(
    results.filter(r => !r.error)
           .map(r => (r.display_symbol||r.symbol||"?")[0].toUpperCase())
  )].sort((a,b) => {
    // numbers first, then letters
    const an = /\d/.test(a), bn = /\d/.test(b);
    if (an && !bn) return -1;
    if (!an && bn) return 1;
    return a < b ? -1 : a > b ? 1 : 0;
  });
  if (initials.length < 2) { bar.innerHTML = ""; return; }
  bar.innerHTML = initials.map(c =>
    `<button class="idx-btn" onclick="scrollToInitial('${c}')">${c}</button>`

/* ── Mobile stock autocomplete ── */
let _mAcStatic=null, _mTwAcStatic=null, _mAcTimer=null, _mAcIdx=-1;

function _mHasChinese(s) { return /[一-鿿]/.test(s); }

async function _mLoadStatic() {
  if (_mAcStatic) return _mAcStatic;
  try { _mAcStatic = await fetch("/static/us_stocks_top.json").then(r=>r.json()); }
  catch { _mAcStatic = []; }
  return _mAcStatic;
}

async function _mLoadTWStatic() {
  if (_mTwAcStatic) return _mTwAcStatic;
  try { _mTwAcStatic = await fetch("/static/tw_stocks.json").then(r=>r.json()); }
  catch { _mTwAcStatic = []; }
  return _mTwAcStatic;
}

async function mAcOnInput(val) {
  const raw = val.trim();
  if (!raw) { mAcClose(); return; }

  if (_mHasChinese(raw)) {
    // Taiwan stock search by Chinese name
    const twList = await _mLoadTWStatic();
    const matches = twList.filter(s => s.n.includes(raw)).slice(0, 5);
    _mAcRender(matches);
    clearTimeout(_mAcTimer);
    _mAcTimer = setTimeout(async () => {
      try {
        const res = await fetch(`/search/tw_stocks?q=${encodeURIComponent(raw)}`).then(r=>r.json());
        const localSyms = new Set(matches.map(s=>s.s));
        const extra = res.filter(s=>!localSyms.has(s.s)).slice(0, 3);
        _mAcRender([...matches, ...extra]);
      } catch {}
    }, 300);
  } else {
    // US / TW symbol search
    const q = raw.toUpperCase();
    const local = await _mLoadStatic();
    const matches = local.filter(s =>
      s.s.startsWith(q) || s.n.toUpperCase().includes(q)
    ).slice(0, 5);
    _mAcRender(matches);
    clearTimeout(_mAcTimer);
    _mAcTimer = setTimeout(async () => {
      try {
        const yahoo = await fetch(`/search/stocks?q=${encodeURIComponent(q)}`).then(r=>r.json());
        const localSyms = new Set(matches.map(s=>s.s));
        const extra = yahoo.filter(s=>!localSyms.has(s.s)).slice(0, 3);
        _mAcRender([...matches, ...extra]);
      } catch {}
    }, 300);
  }
}

function _mAcRender(items) {
  const drop = document.getElementById("mAcDrop");
  if (!drop) return;
  _mAcIdx = -1;
  if (!items.length) { mAcClose(); return; }
  drop.innerHTML = items.map(item =>
    `<div class="m-ac-item" data-sym="${esc(item.s)}" onmousedown="mAcSelect('${esc(item.s)}')">
       <span class="m-ac-sym">${esc(item.s)}</span>
       <span class="m-ac-name">${esc(item.n)}</span>
     </div>`
  ).join("");
  drop.classList.add("open");
}

function mAcSelect(sym) {
  const inp = document.getElementById("addStockInput");
  if (inp) inp.value = sym;
  mAcClose();
  addStock();
}

function mAcClose() {
  const drop = document.getElementById("mAcDrop");
  if (drop) drop.classList.remove("open");
  _mAcIdx = -1;
}

function mAcOnKey(e) {
  const drop = document.getElementById("mAcDrop");
  const items = drop ? [...drop.querySelectorAll(".m-ac-item")] : [];
  if (e.key==="ArrowDown") { e.preventDefault(); _mAcIdx=Math.min(_mAcIdx+1,items.length-1); }
  else if (e.key==="ArrowUp") { e.preventDefault(); _mAcIdx=Math.max(_mAcIdx-1,-1); }
  else if (e.key==="Enter") {
    if (_mAcIdx>=0 && items[_mAcIdx]) { e.preventDefault(); mAcSelect(items[_mAcIdx].dataset.sym); return; }
    mAcClose(); return;
  } else if (e.key==="Escape") { mAcClose(); return; }
  else return;
  items.forEach((el,i)=>el.classList.toggle("active",i===_mAcIdx));
  if(items[_mAcIdx]) items[_mAcIdx].scrollIntoView({block:"nearest"});
}

/* ── Mobile news loader ── */
const _mNewsLoaded = new Set();
async function loadMobileNews(sym) {
  if (!sym || _mNewsLoaded.has(sym)) return;
  const el = document.getElementById(`mnews-${sym}`);
  if (!el) return;
  _mNewsLoaded.add(sym);
  try {
    const data = await fetch(`/news?symbol=${encodeURIComponent(sym)}`).then(r => r.json());
    if (!data.articles || !data.articles.length) {
      el.innerHTML = `<div class="m-news-title">📰 相關新聞</div><span style="font-size:.74rem;color:var(--dim);">暫無新聞</span>`;
      return;
    }
    const now = Math.floor(Date.now() / 1000);
    const fmtTime = ts => {
      if (!ts) return "";
      const diff = now - ts;
      if (diff < 3600)  return Math.floor(diff/60) + "分鐘前";
      if (diff < 86400) return Math.floor(diff/3600) + "小時前";
      return Math.floor(diff/86400) + "天前";
    };
    el.innerHTML = `
      <div class="m-news-title">📰 相關新聞</div>
      ${data.articles.map(a => `
        <div class="m-news-item">
          <a href="${a.url}" target="_blank" rel="noopener">${a.title}</a>
          <div class="m-news-meta">
            <span class="m-news-src">${a.source}</span>
            <span class="m-news-time">${fmtTime(a.time)}</span>
          </div>
        </div>`).join("")}`;
  } catch(e) {
    el.innerHTML = `<span style="font-size:.74rem;color:var(--red);">新聞載入失敗</span>`;
  }
}

/* ── helpers ── */
function mPriceArrow(sym, curr) {
  const prev = _prevPrices[sym];
  if (curr != null) _prevPrices[sym] = curr;
  if (prev == null || curr == null) return '';
  const diff = curr - prev;
  const pct  = Math.abs(diff) / prev;
  if (pct < 0.00005) return '<span style="color:#8b949e;font-size:.85rem;">●</span>';
  const big  = pct >= 0.01;
  if (diff > 0) return `<span style="color:#3fb950;font-size:1rem;font-weight:700;">${big?'↑↑':'↑'}</span>`;
  return         `<span style="color:#f85149;font-size:1rem;font-weight:700;">${big?'↓↓':'↓'}</span>`;
}

function rsiCls(v) {
  if (v==null) return "rsi-norm";
  if (v>=70) return "rsi-hot"; if (v>=55) return "rsi-warm";
  if (v<=35) return "rsi-cold"; return "rsi-norm";
}
function recClass(r) {
  if (r.includes("強力買入")) return "rec-strong-buy";
  if (r.includes("買入"))    return "rec-buy";
  if (r.includes("持有"))    return "rec-hold";
  if (r.includes("低配"))    return "rec-under";
  if (r.includes("賣出"))    return "rec-sell";
  return "rec-hold";
}
function pegCls(v) { if (!v) return "na"; return v<=1.5?"pos":(v<=3?"":"neg"); }
function buyCls(v) { if (v==null) return "na"; return v>=70?"pos":(v>=50?"":"neg"); }
function bbCls(b)  { return b===true?"pos":b===false?"neg":"na"; }
function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
/* ─── auto-sync ── */
let _autoSyncTimer = null, _autoSyncTick = null, _autoSyncSecs = 30;
const AUTO_SYNC_EVERY = 30;

function toggleAutoSync() { _autoSyncTimer ? stopAutoSync() : startAutoSync(); }

function startAutoSync() {
  if (!activeProfile) return;
  _autoSyncSecs = AUTO_SYNC_EVERY;
  _setAutoSyncBtn(true);
  _autoSyncTick = setInterval(() => {
    _autoSyncSecs--;
    const cd = document.getElementById("autoSyncCountdown");
    if (cd) { cd.style.display="inline"; cd.textContent=`${_autoSyncSecs}s`; }
    if (_autoSyncSecs <= 0) { _autoSyncSecs = AUTO_SYNC_EVERY; syncProfile(); }
  }, 1000);
  _autoSyncTimer = true;
}

function stopAutoSync() {
  if (_autoSyncTick) { clearInterval(_autoSyncTick); _autoSyncTick = null; }
  _autoSyncTimer = null;
  _setAutoSyncBtn(false);
  const cd = document.getElementById("autoSyncCountdown");
  if (cd) cd.style.display = "none";
}

function _setAutoSyncBtn(on) {
  const btn = document.getElementById("autoSyncBtn");
  if (!btn) return;
  btn.textContent = on ? "⏱ ON" : "⏱ 自動";
  btn.style.cssText = on
    ? "background:#0d2a1a;color:#3fb950;border:1px solid #238636;"
    : "";
}

/* ─── market status ── */
const _TW_PAT = /^\d{4,6}[A-Za-z]{0,2}(\.TW[O]?)?$/i;
function _getMktInfo(tz, openH, openM, closeH, closeM) {
  const now=new Date(), tzDate=new Date(now.toLocaleString("en-US",{timeZone:tz}));
  const day=tzDate.getDay(), h=tzDate.getHours(), m=tzDate.getMinutes(), s=tzDate.getSeconds();
  const cur=h*60+m, opn=openH*60+openM, cls=closeH*60+closeM;
  const wd=day>=1&&day<=5, isOpen=wd&&cur>=opn&&cur<cls;
  const timeStr=tzDate.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",hour12:false});
  let diff;
  if(isOpen) diff=cls-cur-(s>0?1:0);
  else if(wd&&cur<opn) diff=opn-cur-(s>0?1:0);
  else{const ml=24*60-cur;let nd=(day+1)%7,ex=1;while(nd===0||nd===6){ex++;nd=(nd+1)%7;}diff=ml+(ex-1)*24*60+opn-(s>0?1:0);}
  diff=Math.max(0,diff);
  const hh=Math.floor(diff/60),mm=diff%60;
  return{isOpen,timeStr,countdown:hh>0?`${hh}h ${mm}m`:`${mm}m`,label:isOpen?"距收盤":"距開盤"};
}
function updateMarketStatus(){
  const el=document.getElementById("mMktStatus");
  if(!el||!activeProfile){el&&(el.style.display="none");return;}
  const stocks=(profilesData[activeProfile]||{}).stocks||[];
  const hasTW=stocks.some(s=>_TW_PAT.test(s)), hasUS=stocks.some(s=>!_TW_PAT.test(s));
  const pill=(info,flag,mkt,tz)=>`<span style="display:inline-flex;align-items:center;gap:.2rem;
    background:var(--bg3);border:1px solid var(--border);border-radius:5px;
    padding:.1rem .45rem;font-size:.68rem;font-weight:600;color:${info.isOpen?"#3fb950":"#8b949e"};">
    ${flag} ${mkt} ${info.isOpen?"🟢":"🔴"} ${info.isOpen?"開市":"休市"}
    <span style="font-weight:400;color:var(--dim);">${info.timeStr} ${tz} · ${info.label} ${info.countdown}</span></span>`;
  let html="";
  if(hasUS) html+=pill(_getMktInfo("America/New_York",9,30,16,0),"🇺🇸","NYSE","ET");
  if(hasTW) html+=pill(_getMktInfo("Asia/Taipei",9,0,13,30),"🇹🇼","TWSE","CST");
  if(!html){el.style.display="none";return;}
  el.innerHTML=html; el.style.display="flex";
}
setInterval(updateMarketStatus,60_000);

  if (!el || !results || !results.length) { el && (el.style.display="none"); return; }
  const valid = results.filter(r => !r.error);
  const hasAlpaca   = valid.some(r => r.price_source === "Alpaca");
  const hasShioaji  = valid.some(r => r.price_source === "Shioaji");
  const hasYahoo    = valid.some(r => r.price_source === "Yahoo" || !r.price_source);
  const realtime    = hasAlpaca || hasShioaji;
  let label, color;
  if (realtime) {
    const parts = [];
    if (hasAlpaca)  parts.push("Alpaca");
    if (hasShioaji) parts.push("Shioaji");

  el.style.display = "block";
}

/* ── pull-to-refresh ─────────────────────────────────────── */
(function() {
  const PTR_THRESHOLD = 70;
  const PTR_MAX_H     = 48;
  let startY = 0, pulling = false, triggered = false;

  const bar  = document.getElementById("ptrBar");
  const txt  = document.getElementById("ptrText");
  const main = document.getElementById("main");
  if (!bar || !main) return;

  function setState(state, height) {
    bar.style.height = height + "px";
    bar.className    = "ptr-bar" + (state ? " " + state : "");
    if (state === "ready")   txt.textContent = "放開以同步";
    if (state === "pulling") txt.textContent = "下拉同步行情";
  }

  main.addEventListener("touchstart", e => {
    if (main.scrollTop === 0 && activeProfile) {
      startY    = e.touches[0].clientY;
      pulling   = true;
      triggered = false;
    }
  }, { passive: true });

  main.addEventListener("touchmove", e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy <= 0) { setState("", 0); return; }
    const h = Math.min(dy * 0.5, PTR_MAX_H);
    setState(h >= PTR_MAX_H * 0.9 ? "ready" : "pulling", h);
  }, { passive: true });

  main.addEventListener("touchend", e => {
    if (!pulling) return;
    pulling = false;
    const dy = e.changedTouches[0].clientY - startY;
    setState("", 0);
    if (dy >= PTR_THRESHOLD && !triggered) {
      triggered = true;
      syncProfile();
    }
  }, { passive: true });
})();
</script>

<div class="ma-overlay" id="maOverlay" onclick="if(event.target===this)closeMAChart()">
  <div class="ma-modal">
    <div class="ma-header">
      <h2 id="maTitle">📈 MA Chart</h2>
      <button class="ma-close" onclick="closeMAChart()">✕</button>
    </div>
    <div class="ma-controls">
      <div class="ma-period" id="maPeriodBtns">
        <button onclick="setMAPeriod('1mo')" data-p="1mo">1M</button>
        <button onclick="setMAPeriod('3mo')" data-p="3mo">3M</button>
        <button onclick="setMAPeriod('6mo')" data-p="6mo" class="active">6M</button>
        <button onclick="setMAPeriod('1y')"  data-p="1y">1Y</button>
        <button onclick="setMAPeriod('2y')"  data-p="2y">2Y</button>
      </div>
      <div class="ma-presets" id="maPresetBtns"></div>
      <span class="ma-info" id="maInfo"></span>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const MA_PRESETS = [
  { id:"us_momentum", label:"🇺🇸 US Momentum",    desc:"8 EMA · 21 EMA · 50 SMA",
    mas:[{k:"ema8",l:"EMA 8",c:"#ff9f40"},{k:"ema21",l:"EMA 21",c:"#36a2eb"},{k:"sma50",l:"SMA 50",c:"#4bc0c0"}] },
  { id:"us_macro",    label:"🇺🇸 US Institutional",desc:"50 SMA · 150 SMA · 200 SMA",
    mas:[{k:"sma50",l:"SMA 50",c:"#4bc0c0"},{k:"sma150",l:"SMA 150",c:"#9966ff"},{k:"sma200",l:"SMA 200",c:"#ff6384"}] },
  { id:"tw_short",    label:"🇹🇼 台股短線",         desc:"5 SMA · 10 SMA · 20 SMA",
    mas:[{k:"sma5",l:"SMA 5",c:"#ff9f40"},{k:"sma10",l:"SMA 10",c:"#36a2eb"},{k:"sma20",l:"SMA 20",c:"#4bc0c0"}] },
  { id:"tw_trend",    label:"🇹🇼 台股主力",         desc:"20 SMA · 60 SMA · 240 SMA",
    mas:[{k:"sma20",l:"SMA 20",c:"#4bc0c0"},{k:"sma60",l:"SMA 60",c:"#9966ff"},{k:"sma240",l:"SMA 240",c:"#ff6384"}] },
];

let _maSym="", _maPeriod="6mo", _maPreset=null, _maChart=null, _maData=null;

function openMAChart(sym, isTaiwan, companyName) {
  _maSym=sym; _maPeriod="6mo";
  _maPreset = MA_PRESETS.find(p=>p.id===(isTaiwan?"tw_short":"us_momentum"));
  const title = companyName ? sym+" — "+companyName : sym;
  document.getElementById("maTitle").textContent="📈 "+title;
  document.getElementById("maOverlay").classList.add("open");
  _buildMAPresets(); _setActivePeriod("6mo"); loadMAChart();
}
function closeMAChart() {
  document.getElementById("maOverlay").classList.remove("open");
  if(_maChart){_maChart.destroy();_maChart=null;}
}
function setMAPeriod(p) { _maPeriod=p; _setActivePeriod(p); loadMAChart(); }
function _setActivePeriod(p) {
  document.querySelectorAll("#maPeriodBtns button").forEach(b=>b.classList.toggle("active",b.dataset.p===p));
}
function selectMAPreset(id) {
  _maPreset=MA_PRESETS.find(p=>p.id===id);
  document.querySelectorAll(".ma-preset").forEach(b=>b.classList.toggle("active",b.dataset.id===id));
  if(_maData) renderMAChart(_maData);
}
function _buildMAPresets() {
  document.getElementById("maPresetBtns").innerHTML=MA_PRESETS.map(p=>
    `<button class="ma-preset${_maPreset&&_maPreset.id===p.id?" active":""}" data-id="${p.id}"
       onclick="selectMAPreset('${p.id}')" title="${p.desc}">${p.label}</button>`
  ).join("");
}
async function loadMAChart() {
  document.getElementById("maInfo").textContent="載入中…";
  if(_maChart){_maChart.destroy();_maChart=null;}
  try {
    const data=await fetch(`/chart/ma?symbol=${_maSym}&period=${_maPeriod}`).then(r=>r.json());
    if(data.error){document.getElementById("maInfo").textContent=data.error;return;}
    _maData=data; renderMAChart(data);
  } catch(e){document.getElementById("maInfo").textContent="錯誤: "+e.message;}
}
function renderMAChart(data) {
  if(typeof Chart==="undefined"){document.getElementById("maInfo").textContent="Chart.js 尚未載入";return;}
  if(_maChart){_maChart.destroy();_maChart=null;}
  const preset=_maPreset||MA_PRESETS[0];
  const last=data.close[data.close.length-1];
  document.getElementById("maInfo").textContent=
    `${data.dates[data.dates.length-1]}  收盤: ${last}  (${data.close.length}日)`;
  const datasets=[
    {label:"收盤價",data:data.close,borderColor:"#e6edf3",
     backgroundColor:"rgba(88,166,255,.07)",fill:true,
     borderWidth:1.5,pointRadius:0,tension:0.3,order:10},
    ...preset.mas.map(m=>({
      label:m.l,data:data.mas[m.k],borderColor:m.c,
      borderWidth:1.8,pointRadius:0,tension:0.3,spanGaps:true,order:1
    }))
  ];
  const ctx=document.getElementById("maCanvas").getContext("2d");
  _maChart=new Chart(ctx,{
    type:"line",
    data:{labels:data.dates,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:"index",intersect:false},
      plugins:{
        legend:{labels:{color:"#8b949e",boxWidth:12,font:{size:10}}},
        tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y!=null?c.parsed.y.toFixed(2):"—"}`}}
      },
      scales:{
        x:{ticks:{color:"#8b949e",maxTicksLimit:6,maxRotation:0,font:{size:9}},grid:{color:"rgba(255,255,255,.06)"}},
        y:{position:"right",ticks:{color:"#8b949e",font:{size:9},callback:v=>v.toFixed(0)},grid:{color:"rgba(255,255,255,.06)"}}
      }
    }
  });
}
</script>
